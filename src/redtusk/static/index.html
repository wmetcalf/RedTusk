<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>RedTusk</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 1.5rem; overflow-x: hidden; }
    h1 { color: #c0392b; font-size: 1.8rem; margin-bottom: 1.5rem; }
    h1 span { color: #888; font-size: 1rem; font-weight: normal; margin-left: 0.75rem; }
    .card { background: #2a2a2a; border-radius: 6px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 1rem; color: #c0392b; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .upload-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    input[type="file"] { flex: 1; min-width: 0; color: #e0e0e0; background: #1a1a1a; border: 1px solid #444; border-radius: 4px; padding: 0.45rem 0.6rem; font-family: inherit; font-size: 0.875rem; cursor: pointer; }
    input[type="file"]::file-selector-button { background: #333; color: #e0e0e0; border: 1px solid #555; border-radius: 3px; padding: 0.3rem 0.75rem; font-family: inherit; cursor: pointer; margin-right: 0.75rem; }
    input[type="file"]::file-selector-button:hover { background: #444; }
    .btn-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-top: 0.6rem; }
    button { background: #c0392b; color: #fff; border: none; border-radius: 4px; padding: 0.5rem 1.25rem; font-family: inherit; font-size: 0.9rem; cursor: pointer; white-space: nowrap; }
    button:hover { background: #a93226; }
    button:disabled { background: #555; cursor: not-allowed; }
    button.secondary { background: #444; }
    button.secondary:hover { background: #555; }
    button.danger { background: #5a1515; }
    button.danger:hover { background: #7a1f1f; }
    button.dl { background: #1a3a2a; border: 1px solid #2a6a3a; color: #4caf50; }
    button.dl:hover { background: #1f4a34; }
    .toggles { display: flex; gap: 1rem; align-items: center; font-size: 0.85rem; color: #aaa; margin-top: 0.6rem; }
    .toggles label { display: flex; gap: 0.35rem; align-items: center; cursor: pointer; }
    .toggles input[type="checkbox"] { accent-color: #c0392b; width: 14px; height: 14px; }
    #upload-status { margin-top: 0.6rem; font-size: 0.85rem; color: #888; }
    #upload-result { margin-top: 0.75rem; background: #1a1a1a; border: 1px solid #444; border-radius: 4px; padding: 0.75rem; font-size: 0.8rem; max-height: 280px; overflow-y: auto; display: none; }

    /* Table */
    .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .table-header h2 { margin: 0; }
    #refresh-indicator { font-size: 0.75rem; color: #555; }
    .search-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    #search-input { flex: 1; background: #1a1a1a; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; font-family: inherit; font-size: 0.85rem; padding: 0.35rem 0.6rem; outline: none; }
    #search-input:focus { border-color: #c0392b; }
    #search-input::placeholder { color: #555; }
    #search-clear { background: none; border: none; color: #555; font-size: 1rem; cursor: pointer; padding: 0 0.25rem; line-height: 1; }
    #search-clear:hover { color: #aaa; }
    #search-count { font-size: 0.75rem; color: #555; white-space: nowrap; }
    /* table-layout:fixed pins each column to the width in <colgroup>,
       so a long filename can't push the State/Submitted/Duration/QR
       columns off-screen. .jobs-scroll is a safety net for narrow
       viewports — the table never expands beyond the viewport without
       a horizontal scrollbar showing up. */
    .jobs-scroll { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; table-layout: fixed; min-width: 1000px; }
    thead tr { border-bottom: 1px solid #c0392b; }
    th { text-align: left; padding: 0.5rem 0.6rem; color: #c0392b; font-weight: normal; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.78rem; }
    td { padding: 0.45rem 0.6rem; border-bottom: 1px solid #222; vertical-align: top; }
    /* Cells that should never wrap and should ellipsize when too long
       to fit their column. The Filename column carries this — long
       malicious filenames otherwise push the right-hand columns
       off-screen. Hover for the full name. */
    td.cell-truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* cell-id must show the FULL 36-char UUID. Column is widened to 19rem in
       <colgroup> (was 18ch / ellipsized prefix). Keep overflow:hidden as a
       defensive guard against future column-width tweaks, but with the wider
       column it won't trigger in normal use. */
    td.cell-id { font-family: 'Courier New', monospace; white-space: nowrap; overflow: hidden; }
    tbody tr.job-row { cursor: pointer; transition: background 0.1s; }
    tbody tr.job-row:hover { background: #333; }
    tbody tr.job-row.expanded { background: #2f2f2f; }
    .state { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.78rem; font-weight: bold; }
    .state-queued   { background: #555; color: #ccc; }
    .state-running  { background: #8a5c00; color: #ffc857; }
    .state-succeeded{ background: #1a4a1a; color: #4caf50; }
    .state-failed   { background: #4a1a1a; color: #ef5350; }
    .qr-badge { display: inline-block; background: #1a3a4a; color: #64b5f6; border-radius: 3px; font-size: 0.72rem; padding: 0.1rem 0.4rem; font-weight: bold; margin-left: 0.3rem; }
    .no-jobs { color: #666; font-size: 0.85rem; padding: 0.75rem 0; }

    /* Expand panel */
    .expand-row td { padding: 0; border-bottom: 2px solid #c0392b33; max-width: 0; }
    .expand-panel { background: #111; padding: 1rem 1.25rem; overflow-x: hidden; width: 100%; }
    .expand-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end; margin-bottom: 0.75rem; }
    .expand-actions button { padding: 0.3rem 0.75rem; font-size: 0.8rem; }

    /* Job sections */
    .job-sections { display: grid; gap: 0.75rem; min-width: 0; }
    .job-section { background: #1e1e1e; border: 1px solid #333; border-radius: 4px; min-width: 0; overflow: hidden; }
    .job-section-hdr { padding: 0.4rem 0.75rem; border-bottom: 1px solid #333; font-size: 0.75rem; color: #c0392b; text-transform: uppercase; letter-spacing: 0.06em; display: flex; align-items: center; gap: 0.5rem; }
    .job-section-body { padding: 0.6rem 0.75rem; font-size: 0.82rem; min-width: 0; overflow: hidden; }

    /* KV grid */
    .kv-grid { display: grid; grid-template-columns: minmax(0, max-content) minmax(0, 1fr); gap: 0.25rem 1rem; }
    .kv-key { color: #888; white-space: nowrap; }
    .kv-val { color: #e0e0e0; overflow-wrap: break-word; word-break: break-all; min-width: 0; }
    .kv-val.hash { font-family: 'Courier New', monospace; font-size: 0.75rem; color: #aaa; }
    .kv-val.url  { color: #64b5f6; }

    /* QR codes */
    .qr-list { display: grid; gap: 0.5rem; }
    .qr-item { background: #0d1f2d; border: 1px solid #1a4a6a; border-radius: 4px; padding: 0.5rem 0.75rem; }
    .qr-url { color: #4fc3f7; word-break: break-all; font-size: 0.82rem; }
    .qr-meta { color: #555; font-size: 0.73rem; margin-top: 0.2rem; }

    /* Text preview */
    .text-preview { white-space: pre-wrap; color: #ccc; font-size: 0.8rem; max-height: 120px; overflow: hidden; transition: max-height 0.3s; }
    .text-preview.expanded { max-height: none; }
    .text-toggle { color: #888; font-size: 0.75rem; cursor: pointer; margin-top: 0.4rem; display: inline-block; }
    .text-toggle:hover { color: #aaa; }

    /* Entry list */
    .entry-list { display: grid; gap: 0.4rem; }
    .entry-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 3px; padding: 0.4rem 0.6rem; font-size: 0.78rem; }
    .entry-path { color: #aaa; }
    .entry-ct { color: #666; font-size: 0.73rem; }

    /* Extraction tree */
    .tree { font-size: 0.82rem; }
    .tree-node { border-left: 1px solid #2a2a2a; margin-top: 2px; }
    .tree-node:first-child { border-left: none; }
    .tree-hdr { display: flex; align-items: baseline; gap: 0.3rem; flex-wrap: wrap; padding: 0.25rem 0.4rem; border-radius: 3px; cursor: pointer; }
    .tree-hdr:hover { background: #252525; }
    .tree-arrow { color: #555; font-size: 0.65rem; min-width: 0.8rem; }
    .tree-name { color: #e0e0e0; font-weight: bold; overflow-wrap: break-word; min-width: 0; }
    .tree-ct { color: #666; font-size: 0.73rem; }
    .tree-size { color: #555; font-size: 0.73rem; }
    .tree-tag   { background: #1a3a1a; color: #4caf50; border-radius: 2px; font-size: 0.68rem; padding: 0.05rem 0.3rem; }
    .tree-err   { background: #3a1a1a; color: #ef5350; border-radius: 2px; font-size: 0.68rem; padding: 0.05rem 0.3rem; }
    .tree-blank { background: #2a2a2a; color: #777;    border-radius: 2px; font-size: 0.68rem; padding: 0.05rem 0.3rem; }
    .tree-body { padding: 0.3rem 0.4rem 0.4rem 1.6rem; border-left: 1px solid #333; margin-left: 0.4rem; }
    .tree-meta { color: #888; font-size: 0.78rem; margin-top: 0.25rem; overflow-wrap: break-word; word-break: break-all; }
    .tree-meta .mono { font-family: 'Courier New', monospace; font-size: 0.72rem; color: #aaa; }
    .meta-table { margin-top: 0.4rem; border-top: 1px solid #2a2a2a; padding-top: 0.3rem; }
    .meta-row { display: flex; gap: 0.5rem; font-size: 0.72rem; line-height: 1.4; padding: 0.05rem 0; border-bottom: 1px solid #1e1e1e; }
    .meta-row:hover { background: #1a1a1a; }
    .meta-key { color: #555; flex: 0 0 auto; max-width: 45%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'Courier New', monospace; }
    .meta-val { color: #999; flex: 1; overflow-wrap: break-word; word-break: break-all; font-family: 'Courier New', monospace; }
    .meta-sec .meta-key { color: #ffb74d; }
    .meta-sec .meta-val { color: #ffe082; }
    /* Truncated metadata values — click ellipsis to lazy-expand from JS memory. */
    .meta-ellipsis { color: #64b5f6; cursor: pointer; user-select: none; padding-left: 0.15rem; }
    .meta-ellipsis:hover { color: #90caf9; text-decoration: underline; }
    .meta-val.expanded .meta-truncated { white-space: pre-wrap; }

    /* Hash links and similarity panel — modeled after clippyshot. */
    .hash-link { color: #64b5f6; cursor: pointer; font-family: 'Courier New', monospace; text-decoration: none; }
    .hash-link:hover { color: #90caf9; text-decoration: underline; }
    .similar-panel { position: fixed; top: 0; right: 0; width: min(560px, 92vw); height: 100vh; background: #0d1117; border-left: 1px solid #30363d; z-index: 1020; display: none; flex-direction: column; box-shadow: -12px 0 32px rgba(0,0,0,.6); }
    .similar-panel.show { display: flex; }
    .similar-panel header { background: #161b22; padding: 14px 18px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
    .similar-panel header h3 { font-size: 0.95rem; font-weight: 600; color: #c9d1d9; margin: 0; }
    .similar-panel .close-sim { background: none; border: none; color: #8b949e; font-size: 1.5rem; line-height: 1; cursor: pointer; padding: 0 4px; }
    .similar-panel .close-sim:hover { color: #f85149; }
    .similar-panel .sim-body { flex: 1; overflow-y: auto; padding: 12px; }
    .similar-controls { display: flex; gap: 0.5rem; padding: 8px 12px; border-bottom: 1px solid #1e1e1e; align-items: center; font-size: 0.78rem; color: #8b949e; }
    .similar-controls label { display: flex; align-items: center; gap: 0.3rem; }
    .similar-controls input { width: 4rem; background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 2px 6px; border-radius: 3px; font-size: 0.78rem; }
    .similar-tile { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 8px 10px; margin-bottom: 8px; font-size: 0.76rem; color: #8b949e; }
    .similar-tile:hover { border-color: #58a6ff; }
    .similar-tile .top { display: flex; justify-content: space-between; gap: 0.5rem; margin-bottom: 4px; }
    .similar-tile .fname { color: #c9d1d9; font-weight: 500; word-break: break-all; }
    .similar-tile .dist { background: rgba(63,185,113,.12); color: #3fb950; padding: 1px 6px; border-radius: 3px; font-size: 0.7rem; align-self: flex-start; white-space: nowrap; }
    .similar-tile .meta { display: flex; flex-direction: column; gap: 2px; word-break: break-all; }
    .similar-tile .meta a { color: #58a6ff; text-decoration: none; font-family: 'Courier New', monospace; }
    .similar-tile .meta a:hover { text-decoration: underline; }
    .similar-empty { color: #6e7681; padding: 1rem; text-align: center; font-size: 0.8rem; }

    /* Pool status */
    .pool-bar { display: flex; gap: 0.4rem; align-items: center; font-size: 0.78rem; color: #666; margin-top: 0.35rem; flex-wrap: wrap; }
    .pool-slot { display: inline-block; width: 12px; height: 12px; border-radius: 2px; }
    .slot-idle     { background: #2a5a2a; }
    .slot-assigned { background: #7a5000; }
    .slot-warming  { background: #2a2a6a; }

    /* Pagination controls (replaces infinite scroll) */
    #pager { margin-top: 0.6rem; display: flex; gap: 0.25rem; align-items: center; flex-wrap: wrap; font-size: 0.78rem; }
    #pager .pg { background: #1f1f1f; border: 1px solid #333; color: #ccc; padding: 0.15rem 0.55rem; border-radius: 3px; cursor: pointer; user-select: none; min-width: 1.5rem; text-align: center; }
    #pager .pg:hover { background: #2a2a2a; }
    #pager .pg.active { background: #c0392b33; border-color: #c0392b; color: #fff; cursor: default; }
    #pager .pg.disabled { opacity: 0.35; pointer-events: none; }
    #pager .pg.gap { background: none; border: none; cursor: default; pointer-events: none; padding: 0.15rem 0.3rem; color: #666; }
    #pager .count { color: #888; margin-left: 0.5rem; font-variant-numeric: tabular-nums; }

    /* State-filter pills above the jobs table */
    .pill { background: #1f1f1f; border: 1px solid #333; border-radius: 12px; padding: 0.15rem 0.7rem; cursor: pointer; user-select: none; color: #ccc; }
    .pill:hover { background: #2a2a2a; }
    .pill.active { background: #c0392b33; border-color: #c0392b; color: #fff; }
    .pill-queued.active    { background: #5a5a2a; border-color: #c08c30; color: #fff; }
    .pill-running.active   { background: #2a4a7a; border-color: #4080d0; color: #fff; }
    .pill-succeeded.active { background: #2a5a2a; border-color: #4a9a4a; color: #fff; }
    .pill-failed.active    { background: #5a2a2a; border-color: #ef5350; color: #fff; }
    .pill .n { opacity: 0.7; margin-left: 0.25rem; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <aside class="similar-panel" id="similar-panel" aria-hidden="true">
    <header>
      <h3 id="similar-title">Similar entries</h3>
      <button class="close-sim" id="similar-close" type="button" aria-label="Close">✕</button>
    </header>
    <div class="similar-controls" id="similar-controls">
      <label>max hamming <input type="number" id="similar-max-hamming" min="0" max="64" value="5"></label>
      <button type="button" id="similar-refetch" style="background:#1f6feb;color:#fff;border:0;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:0.78rem">Refetch</button>
      <span id="similar-count" style="color:#8b949e;font-size:0.78rem;margin-left:0.25rem"></span>
    </div>
    <div class="sim-body" id="similar-body"></div>
  </aside>
  <h1>
    <picture>
      <source srcset="/static/logo.webp" type="image/webp">
      <img src="/static/logo.png" alt="RedTusk" style="height:4rem;vertical-align:middle;margin-right:0.75rem;margin-bottom:0.2rem">
    </picture><a href="/" onclick="event.preventDefault();navigateToList()" style="color:inherit;text-decoration:none">RedTusk</a> <span id="version"></span> <a href="https://suno.com/s/JfDeaLrS1JUN6dfe" target="_blank" rel="noopener" title="Theme song" style="font-size:1rem;text-decoration:none;margin-left:0.5rem;opacity:0.7" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">🎶</a></h1>

  <!-- Detail view — shown only on /jobs/<id>. Renders into #detail-content
       via showJobDetailView(). -->
  <div id="detail-view" style="display:none">
    <div class="card">
      <div class="detail-hdr" style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem">
        <a href="/" onclick="event.preventDefault();navigateToList()" style="color:#64b5f6;text-decoration:none;font-size:0.9rem">← Recent Jobs</a>
        <span style="color:#555">/</span>
        <span style="font-family:'Courier New',monospace;font-size:0.85rem;color:#c0392b" id="detail-id"></span>
        <span id="detail-state" style="margin-left:auto"></span>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- List view — shown on / (default). The Extract + Recent Jobs cards. -->
  <div id="list-view">
  <div class="card">
    <h2>Extract</h2>
    <div class="upload-row">
      <input type="file" id="file-input" multiple>
    </div>
    <div class="toggles">
      <label><input type="checkbox" id="toggle-qr" checked> QR</label>
      <label><input type="checkbox" id="toggle-ocr" checked> OCR</label>
      <label><input type="checkbox" id="toggle-thumbnails" checked> Thumbnails</label>
      <label style="margin-left:0.5rem;color:#777">Depth:</label>
      <input type="number" id="opt-depth" min="1" max="50" value="10"
             style="width:3.5rem;background:#1a1a1a;border:1px solid #444;color:#ccc;padding:0.1rem 0.3rem;border-radius:3px;font-size:0.85rem">
      <label style="color:#777">Max entries:</label>
      <input type="number" id="opt-entries" min="1" max="10000" value="5000"
             style="width:4.5rem;background:#1a1a1a;border:1px solid #444;color:#ccc;padding:0.1rem 0.3rem;border-radius:3px;font-size:0.85rem">
    </div>
    <div class="btn-row">
      <button id="sync-btn" onclick="uploadSync()">Extract (sync)</button>
      <button id="queue-btn" class="secondary" onclick="uploadAsync()">Queue (async)</button>
    </div>
    <div id="upload-status"></div>
    <div id="upload-result"></div>
  </div>

  <div class="card">
    <div class="table-header">
      <h2>Recent Jobs</h2>
      <span id="refresh-indicator"></span>
    </div>
    <div id="pool-status" class="pool-bar"></div>
    <div class="search-row" style="margin-top:0.5rem">
      <input type="text" id="search-input" placeholder="Search by filename (partial), SHA-256, or OCR/extracted text…"
             oninput="onSearch(this.value)" autocomplete="off" spellcheck="false" title="Search by filename (partial), SHA-256, or job ID">
      <button id="search-clear" onclick="clearSearch()" title="Clear">×</button>
      <span id="search-count"></span>
    </div>
    <div id="state-pills" style="margin-top:0.4rem;display:flex;gap:0.4rem;flex-wrap:wrap;font-size:0.78rem"></div>
    <div class="jobs-scroll" style="margin-top:0.25rem">
      <table>
        <colgroup>
          <col style="width: 19rem">    <!-- ID (full 36-char UUID, no ellipsis) -->
          <col>                         <!-- Filename (flexes to fill) -->
          <col style="width: 9rem">    <!-- State -->
          <col style="width: 9rem">    <!-- Submitted -->
          <col style="width: 6.5rem">  <!-- Duration -->
          <col style="width: 4.5rem">  <!-- QR -->
        </colgroup>
        <thead>
          <tr><th>ID</th><th>Filename</th><th>State</th><th>Submitted</th><th>Duration</th><th>QR</th></tr>
        </thead>
        <tbody id="jobs-body">
          <tr><td colspan="6" class="no-jobs">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div id="pager"></div>
  </div>
  </div><!-- #list-view -->

  <script>
    // ── version ───────────────────────────────────────────────────
    fetch('/version').then(r=>r.text()).then(v=>{
      document.getElementById('version').textContent = v.trim();
    }).catch(()=>{});

    // ── helpers ───────────────────────────────────────────────────
    function relativeTime(iso) {
      if (!iso) return '—';
      const d = (Date.now() - new Date(iso)) / 1000;
      if (d < 5)    return 'just now';
      if (d < 60)   return Math.floor(d) + 's ago';
      if (d < 3600) return Math.floor(d/60) + 'm ago';
      if (d < 86400)return Math.floor(d/3600) + 'h ago';
      return Math.floor(d/86400) + 'd ago';
    }
    function fmtMs(ms) {
      if (ms == null) return '—';
      const s = ms / 1000;
      return s < 60 ? s.toFixed(1)+'s' : Math.floor(s/60)+'m '+Math.floor(s%60)+'s';
    }
    function duration(job) {
      if (!job) return '—';
      const proc = job.processing_ms != null ? job.processing_ms : null;
      const queue = job.queue_ms != null ? job.queue_ms : null;
      if (proc == null && !job.started_at) return '—';
      // Fallback: compute from timestamps when pre-computed fields absent (old records)
      const procMs = proc != null ? proc : (() => {
        const end = job.completed_at ? new Date(job.completed_at) : new Date();
        return end - new Date(job.started_at);
      })();
      const qMs = queue != null ? queue : 0;
      const procStr = fmtMs(procMs);
      const qStr = qMs > 500 ? ' (q:'+fmtMs(qMs)+')' : '';
      return procStr + qStr;
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmt_bytes(n) {
      if (!n) return '0 B';
      const units = ['B','KB','MB','GB'];
      let i = 0;
      while (n >= 1024 && i < units.length-1) { n/=1024; i++; }
      return n.toFixed(i?1:0)+' '+units[i];
    }
    function optParams() {
      const qr        = document.getElementById('toggle-qr').checked;
      const ocr       = document.getElementById('toggle-ocr').checked;
      const thumbs    = document.getElementById('toggle-thumbnails').checked;
      const depth     = parseInt(document.getElementById('opt-depth').value) || 10;
      const entries   = parseInt(document.getElementById('opt-entries').value) || 5000;
      return '?enable_qr='+qr+'&enable_ocr='+ocr
           + '&enable_thumbnails='+thumbs
           + '&max_recursion_depth='+depth
           + '&max_embedded_entries='+entries;
    }

    // ── upload ────────────────────────────────────────────────────
    async function uploadSync() {
      const files = document.getElementById('file-input').files;
      if (!files.length) { setStatus('Select a file first.'); return; }
      setButtons(true); setStatus('Extracting '+files[0].name+'…');
      document.getElementById('upload-result').style.display='none';
      try {
        const resp = await fetch('/v1/convert'+optParams(), {
          method:'POST', body:files[0],
          headers:{'Content-Disposition':'attachment; filename="'+encodeURIComponent(files[0].name)+'"'}
        });
        const data = await resp.json().catch(()=>null);
        setStatus(resp.ok ? 'Done ('+resp.status+')' : 'Error '+resp.status);
        if (data) { const el=document.getElementById('upload-result'); el.innerHTML=buildJobView(data); el.style.display='block'; }
      } catch(e) { setStatus('Failed: '+e.message); }
      finally { setButtons(false); fetchJobs(); }
    }

    async function uploadAsync() {
      const files = document.getElementById('file-input').files;
      if (!files.length) { setStatus('Select file(s) first.'); return; }
      setButtons(true); setStatus('Queuing '+files.length+' file(s)…');
      let ok=0, fail=0;
      for (const f of files) {
        try {
          const r = await fetch('/v1/jobs'+optParams(), {
            method:'POST', body:f,
            headers:{'Content-Disposition':'attachment; filename="'+encodeURIComponent(f.name)+'"'}
          });
          if (r.ok) ok++; else fail++;
        } catch { fail++; }
      }
      setStatus('Queued: '+ok+(fail?', failed: '+fail:''));
      setButtons(false); fetchJobs();
    }

    function setButtons(d) {
      document.getElementById('sync-btn').disabled=d;
      document.getElementById('queue-btn').disabled=d;
    }
    function setStatus(m) { document.getElementById('upload-status').textContent=m; }

    // ── shared metadata rendering ─────────────────────────────────
    const SECURITY_KEYS = new Set([
      'rtf_meta:emb_ole2link_url','rtf_meta:emb_source_path','rtf_meta:emb_label',
      'rtf_meta:emb_class','rtf_meta:emb_class_obfuscated','rtf_meta:emb_clsid',
      'rtf_meta:emb_topic','rtf_meta:emb_item','rtf_meta:objdata_decoy_count',
      'rtf_meta:hex_escape_in_objdata','rtf_meta:unicode_in_objdata',
      'rtf_meta:malformed_rtf_header','rtf_meta:template_url',
      'rtf_meta:unc_path','rtf_meta:url','rtf_meta:ip',
      'dc:title','dc:description','extended-properties:Template',
    ]);
    // Lazy expand: full values are kept here in JS memory (where they already
    // live in the parsed job JSON via jobCache), NOT eagerly serialized into
    // the DOM. On click, swap the truncated text for the full value — single
    // O(1) lookup, no round-trip, no DOM bloat per-render.
    const metaFullValues = new Map(); // dom-id -> full string
    let metaSeq = 0;

    function metaExpand(ev) {
      // Event is delegated from document, so currentTarget == document.
      // The clicked .meta-ellipsis is in ev.target.
      const ell = ev.target;
      const id = ell.dataset.metaId;
      if (!id) return;
      const cell = ell.closest('.meta-val');
      const full = metaFullValues.get(id);
      if (cell && full != null) {
        const node = cell.querySelector('.meta-truncated');
        if (node) {
          node.textContent = full;     // textContent handles XSS-safe insertion
        }
        cell.classList.add('expanded');
        ell.style.display = 'none';
        // Free the cached string once revealed — the DOM owns it now.
        metaFullValues.delete(id);
      }
      ev.stopPropagation();
    }

    // Event delegation: works for any dynamically-inserted meta table.
    document.addEventListener('click', (ev) => {
      const t = ev.target;
      if (t && t.classList && t.classList.contains('meta-ellipsis')) {
        metaExpand(ev);
      } else if (t && t.classList && t.classList.contains('hash-link')) {
        ev.preventDefault();
        openSimilarPanel(t.dataset.hash, t.dataset.val);
      }
    });

    // ── similarity panel ─────────────────────────────────────────────
    let _simCurrent = { kind: null, value: null };

    function openSimilarPanel(kind, value) {
      _simCurrent = { kind, value };
      const panel = document.getElementById('similar-panel');
      const title = document.getElementById('similar-title');
      const controls = document.getElementById('similar-controls');
      controls.style.display = (kind === 'phash') ? 'flex' : 'none';
      title.textContent = 'Similar by ' + kind + ': ' + value.slice(0, 16) + (value.length > 16 ? '…' : '');
      document.getElementById('similar-body').innerHTML = '<div class="similar-empty">Loading…</div>';
      panel.classList.add('show');
      panel.setAttribute('aria-hidden', 'false');
      fetchSimilar();
    }

    async function fetchSimilar() {
      const { kind, value } = _simCurrent;
      if (!kind || !value) return;
      const body = document.getElementById('similar-body');
      const countEl = document.getElementById('similar-count');
      const params = new URLSearchParams({ [kind]: value, limit: '50' });
      if (kind === 'phash') {
        const mh = document.getElementById('similar-max-hamming').value || '5';
        params.set('max_hamming', mh);
      }
      if (countEl) countEl.textContent = '…';
      try {
        const r = await fetch('/v1/similar?' + params.toString());
        if (!r.ok) {
          const err = await r.text();
          body.innerHTML = '<div class="similar-empty" style="color:#ef5350">' + esc(err) + '</div>';
          if (countEl) countEl.textContent = '';
          return;
        }
        const d = await r.json();
        const matches = d.matches || [];
        renderSimilarMatches(matches);
        // Match count next to the Refetch button — shows whether the result is
        // capped (we request limit=50) so users know to widen max_hamming when
        // 50 means "≥50 matches, refining would help".
        if (countEl) {
          const capped = matches.length >= 50;
          countEl.textContent = matches.length + (capped ? '+ matches' : ' match' + (matches.length === 1 ? '' : 'es'));
        }
      } catch (e) {
        body.innerHTML = '<div class="similar-empty" style="color:#ef5350">Network error: ' + esc(e.message) + '</div>';
        if (countEl) countEl.textContent = '';
      }
    }

    function thumbUrlFor(jobId, entryPath) {
      if (!jobId) return null;
      if (!entryPath || entryPath === '/') {
        return '/v1/jobs/' + jobId + '/artifacts/thumbnail.jpg';
      }
      const rel = entryPath.startsWith('/') ? entryPath.slice(1) : entryPath;
      return '/v1/jobs/' + jobId + '/artifacts/embedded/thumbnails/' + rel + '.jpg';
    }

    function renderSimilarMatches(matches) {
      const body = document.getElementById('similar-body');
      if (!matches.length) {
        body.innerHTML = '<div class="similar-empty">No matches.</div>';
        return;
      }
      let html = '';
      for (const m of matches) {
        const thumb = thumbUrlFor(m.job_id, m.entry_path);
        html += '<div class="similar-tile">';
        html += '<div class="top">';
        html += '<span class="fname">' + esc(m.filename || m.entry_path || '—') + '</span>';
        if (m.distance != null) html += '<span class="dist">Δ ' + m.distance + '</span>';
        html += '</div>';
        if (thumb) {
          html += '<img src="' + esc(thumb) + '" alt="" loading="lazy" ' +
                  'style="max-width:100%;max-height:160px;border:1px solid #30363d;' +
                  'border-radius:3px;margin-bottom:6px;display:block" ' +
                  'onerror="this.style.display=\'none\'">';
        }
        html += '<div class="meta">';
        html += '<div>entry: <span style="color:#c9d1d9">' + esc(m.entry_path || '/') + '</span></div>';
        if (m.content_type) html += '<div>ct: <span style="color:#c9d1d9">' + esc(m.content_type) + '</span></div>';
        if (m.phash)        html += '<div>phash: ' + esc(m.phash) + '</div>';
        if (m.colorhash)    html += '<div>colorhash: ' + esc(m.colorhash) + '</div>';
        if (m.sha256)       html += '<div>sha256: ' + esc(m.sha256) + '</div>';
        html += '<div><a href="/jobs/' + esc(m.job_id) + '" onclick="event.preventDefault();navigateToJob(\'' + esc(m.job_id) + '\')" style="font-family:\'Courier New\',monospace">Open job ' + esc(m.job_id) + '</a></div>';
        html += '</div></div>';
      }
      body.innerHTML = html;
    }

    document.getElementById('similar-close').addEventListener('click', () => {
      const panel = document.getElementById('similar-panel');
      panel.classList.remove('show');
      panel.setAttribute('aria-hidden', 'true');
    });
    document.getElementById('similar-refetch').addEventListener('click', fetchSimilar);
    // Escape closes the panel.
    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape') {
        const p = document.getElementById('similar-panel');
        if (p.classList.contains('show')) {
          p.classList.remove('show');
          p.setAttribute('aria-hidden', 'true');
        }
      }
    });

    function renderMetaTable(meta) {
      const keys = Object.keys(meta).sort();
      if (!keys.length) return '';
      const groups = {};
      for (const k of keys) {
        const grp = k.includes(':') ? k.split(':')[0] : 'other';
        (groups[grp] = groups[grp]||[]).push(k);
      }
      const TRUNC = 200;
      let out = '<div class="meta-table">';
      for (const grp of Object.keys(groups).sort()) {
        for (const k of groups[grp]) {
          const raw = meta[k];
          // Multi-valued metadata arrives as a JS array — stringify uniformly.
          const v = Array.isArray(raw) ? raw.join('\n') : String(raw);
          const isSec = SECURITY_KEYS.has(k);
          if (v.length > TRUNC) {
            // Stash the full value in JS memory, NOT in the DOM.
            const id = 'm' + (++metaSeq);
            metaFullValues.set(id, v);
            const head = esc(v.slice(0, TRUNC));
            out += '<div class="meta-row'+(isSec?' meta-sec':'')+'">' +
                   '<span class="meta-key">'+esc(k)+'</span>' +
                   '<span class="meta-val truncatable">' +
                     '<span class="meta-truncated">'+head+'</span>' +
                     '<span class="meta-ellipsis" data-meta-id="'+id+'" ' +
                           'title="Click to expand ('+v.length+' chars)">…</span>' +
                   '</span></div>';
          } else {
            out += '<div class="meta-row'+(isSec?' meta-sec':'')+'">' +
                   '<span class="meta-key">'+esc(k)+'</span>' +
                   '<span class="meta-val">'+esc(v)+'</span></div>';
          }
        }
      }
      out += '</div>';
      return out;
    }

    // ── structured job view ───────────────────────────────────────
    function buildJobView(jobOrResult, jobId) {
      // Each new job view starts with a fresh lazy-expand cache so values
      // belonging to a previously-viewed job don't accumulate in memory.
      metaFullValues.clear();

      // Accept either a full job record or a bare result object.
      const isFullJob = jobOrResult && ('state' in jobOrResult || 'queue_ms' in jobOrResult);
      const job    = isFullJob ? jobOrResult : null;
      const result = isFullJob ? jobOrResult.result : jobOrResult;
      if (!result) return '<span style="color:#666">No result</span>';
      const ext = result.extraction || {};
      const entries = ext.entries || [];
      const inp = result.input || {};
      const sandbox = result.sandbox || {};

      const allQr = [];
      let fullText = '';
      for (const e of entries) {
        for (const c of (e.qr?.codes||[])) allQr.push({entry:e.path,...c});
        if (!fullText && e.text) fullText = e.text.trim().replace(/\n{3,}/g, '\n\n');
      }
      // Always show expander when there's text — max-height CSS clips regardless of char count
      const hasMore = fullText.length > 0;

      let html = '<div class="job-sections">';

      // ── Summary ──
      html += '<div class="job-section"><div class="job-section-hdr">Summary</div><div class="job-section-body"><div class="kv-grid">';
      // Full job ID first — needed so users can copy/paste / quote in tickets
      // without hovering the row in the recent-jobs table. kvHash() applies
      // the monospace .hash style. Fall back to job.id if jobId wasn't passed
      // (some callers pass only the bare result object).
      html += kvHash('Job ID', jobId || (job && job.id) || '—');
      html += kv('Content-Type', ext.root_content_type||'—');
      html += kv('Language',     ext.root_language||'—');
      html += kv('Entries',      entries.length);
      html += kv('Parse time',  (ext.duration_ms||0)+'ms');
      if (job && job.queue_ms != null)      html += kv('Queue time',  fmtMs(job.queue_ms));
      if (job && job.pool_wait_ms != null)  html += kv('Pool wait',   fmtMs(job.pool_wait_ms));
      if (job && job.processing_ms != null) html += kv('Worker time', fmtMs(job.processing_ms));
      if (job && job.parse_ms != null)      html += kv('Tika parse',  fmtMs(job.parse_ms));
      if (result.truncated) html += kv('Truncated', result.truncated.reason+' ('+result.truncated.observed+'/'+result.truncated.limit+')');
      if ((result.warnings||[]).length) html += kv('Warnings', result.warnings.length);
      html += '</div></div></div>';

      // ── Input / Hashes ──
      html += '<div class="job-section"><div class="job-section-hdr">Input &amp; Hashes</div><div class="job-section-body"><div class="kv-grid">';
      html += kv('Filename',    inp.filename_hint||'—');
      html += kv('Size',        fmt_bytes(inp.size_bytes));
      html += kvHash('SHA-256', inp.sha256||'—');
      html += kv('Submitted',   inp.submitted_at ? new Date(inp.submitted_at).toLocaleString() : '—');
      // Per-entry hashes (non-null ones)
      for (const e of entries) {
        if (e.sha256) html += kvHash(e.path+' sha256', e.sha256);
      }
      html += kv('Sandbox',     sandbox.profile+' / '+sandbox.runtime+(sandbox.appcds?' + AppCDS':''));
      html += '</div></div></div>';

      // ── Root Metadata ──
      const rootEntry = entries.find(e => e.path === '/');
      if (rootEntry && Object.keys(rootEntry.metadata||{}).length) {
        html += '<div class="job-section"><div class="job-section-hdr">Root Metadata</div><div class="job-section-body">';
        html += renderMetaTable(rootEntry.metadata);
        html += '</div></div>';
      }

      // ── QR codes ──
      if (allQr.length) {
        html += '<div class="job-section"><div class="job-section-hdr">QR Codes <span style="color:#64b5f6">×'+allQr.length+'</span></div><div class="job-section-body"><div class="qr-list">';
        for (const c of allQr) {
          html += '<div class="qr-item"><div class="qr-url">'+esc(c.data)+'</div>';
          html += '<div class="qr-meta">'+esc(c.format||'')+(c.position?' · '+esc(c.position):'')+(c.raw_bytes?' · bytes: '+esc(c.raw_bytes.slice(0,40)):'')+'</div></div>';
        }
        html += '</div></div></div>';
      }

      // ── Text preview ──
      if (fullText) {
        const uid = 'txt-'+(Math.random().toString(36).slice(2));
        html += '<div class="job-section"><div class="job-section-hdr">Text</div><div class="job-section-body">';
        html += '<div class="text-preview" id="'+uid+'">'+esc(fullText)+'</div>';
        if (fullText.length > 300) {
          html += '<span class="text-toggle" data-uid="'+uid+'" data-full="'+esc(fullText)+'" onclick="toggleText(this)">▼ show full ('+fullText.length.toLocaleString()+' chars)</span>';
        }
        html += '</div></div>';
      }

      // ── Extraction Tree ──
      html += '<div class="job-section"><div class="job-section-hdr">Extraction Tree';
      html += ' <span style="color:#666;font-weight:normal;font-size:0.8rem">('+entries.length+' entr'+(entries.length===1?'y':'ies')+')</span></div>';
      html += '<div class="job-section-body">'+buildTree(entries, jobId)+'</div></div>';

      html += '</div>';
      return html;
    }

    // ── entry-type icon ───────────────────────────────────────────
    function ctIcon(ct) {
      if (!ct) return '📄';
      if (ct.includes('pdf'))          return '📕';
      if (ct.includes('image'))        return '🖼';
      if (ct.includes('zip')||ct.includes('archive')||ct.includes('compressed')) return '📦';
      if (ct.includes('word')||ct.includes('odt'))  return '📝';
      if (ct.includes('excel')||ct.includes('spreadsheet')||ct.includes('ods')) return '📊';
      if (ct.includes('powerpoint')||ct.includes('presentation')||ct.includes('odp')) return '📊';
      if (ct.includes('vbasic')||ct.includes('macro')||ct.includes('script')) return '⚠️';
      if (ct.includes('text')||ct.includes('plain')||ct.includes('rtf')) return '📄';
      if (ct.includes('html'))         return '🌐';
      if (ct.includes('email')||ct.includes('rfc822')) return '✉️';
      return '📄';
    }

    function buildTree(entries, jobId) {
      if (!entries.length) return '<span style="color:#555">—</span>';

      // Build node map keyed by path
      const nodeMap = new Map();
      for (const e of entries) nodeMap.set(e.path, e);

      // Render each entry as an expandable tree node
      let html = '<div class="tree">';
      for (const e of entries) {
        const depth = e.depth || 0;
        const name = e.path==='/' ? '/' : e.path.split('/').filter(Boolean).pop() || e.path;
        const ct = e.content_type || '';
        const ctShort = ct.split('/').pop() || ct;
        const qrCodes = e.qr?.codes || [];
        // For image entries Tika writes OCR output into TIKA_CONTENT, so e.text === e.ocr.text.
        // Treat the entry as "pure OCR" if content-type is a raster image (not SVG).
        // SVG text comes from <text> element extraction, not OCR — label it differently.
        const isRasterImage = ct.startsWith('image/') && ct !== 'image/svg+xml';
        const isSvg = ct === 'image/svg+xml';
        // Suppress the ocrText block for raster images — it's identical to entryText and
        // would render twice.  For SVG, the text is extracted (not OCR) and shown below.
        const ocrText = isRasterImage ? '' : (e.ocr?.text || '').trim().replace(/\n{3,}/g,'\n\n');
        const sha = e.sha256;
        const meta = e.metadata || {};
        const uid = 'e-'+(Math.random().toString(36).slice(2));

        // Key metadata to surface in the header row summary (brief)
        const metaHighlights = [];
        for (const k of ['Image Width','Image Height','xmpTPg:NPages','meta:word-count',
                          'dc:creator','dc:title','dcterms:created','img:Quality','Content-Length']) {
          if (meta[k]) metaHighlights.push(k.split(':').pop().split(/(?=[A-Z])/).join(' ')+': '+meta[k]);
        }

        html += '<div class="tree-node" style="margin-left:'+(depth*16)+'px">';

        // Header row (always visible)
        html += '<div class="tree-hdr" onclick="treeToggle(\''+uid+'\')">';
        html += '<span class="tree-arrow" id="arr-'+uid+'">▶</span> ';
        html += ctIcon(ct)+' ';
        html += '<span class="tree-name">'+esc(name)+'</span> ';
        html += '<span class="tree-ct">'+esc(ctShort)+'</span>';
        if (e.size_bytes) html += ' <span class="tree-size">'+fmt_bytes(e.size_bytes)+'</span>';
        if (qrCodes.length) html += ' <span class="qr-badge">QR×'+qrCodes.length+'</span>';
        // Show OCR badge when OCR produced output; not for SVG (that's text extraction, not OCR)
        if (e.ocr?.text && !isSvg) html += ' <span class="tree-tag">OCR</span>';
        if (e.ocr?.skipped === 'blank_image') html += ' <span class="tree-blank" title="OCR skipped — blank/uniform image (phash/colorhash)">BLANK</span>';
        if (e.thumbnail_skipped === 'zero_byte_stream') html += ' <span class="tree-blank" title="Thumbnail unavailable — Pass 2 received zero bytes (deeply nested or VBA source-stripped entry)">NO-THUMB</span>';
        if (e.thumbnail_skipped === 'pass2_missed_entry') html += ' <span class="tree-blank" title="Thumbnail unavailable — Pass 1 saw this image entry but Pass 2 (byte-saving pass) didn\'t surface it (Tika parser path difference, common with some MSG/MAPI attachment shapes)">NO-THUMB</span>';
        if (e.error) html += ' <span class="tree-err">ERR</span>';
        html += '</div>';

        // Detail panel (hidden by default)
        html += '<div class="tree-body" id="'+uid+'" style="display:none">';

        if (e.has_thumbnail && jobId) {
          // Root entry thumbnail is written directly as thumbnail.jpg;
          // embedded entry thumbnails mirror the path under embedded/thumbnails/.
          let thumbUrl;
          if (e.path === '/') {
            thumbUrl = '/v1/jobs/'+jobId+'/artifacts/thumbnail.jpg';
          } else {
            const rel = e.path.startsWith('/') ? e.path.slice(1) : e.path;
            thumbUrl = '/v1/jobs/'+jobId+'/artifacts/embedded/thumbnails/'+rel+'.jpg';
          }
          // data-src: deferred until the tree node is opened (set by treeToggle)
          html += '<img data-src="'+esc(thumbUrl)+'" alt="" style="max-width:256px;max-height:256px;display:block;margin:0.4rem 0;border:1px solid #333;border-radius:3px" onerror="thumbErr(this)">';
        }
        if (sha)          html += '<div class="tree-meta">sha256: <a class="hash-link" data-hash="sha256" data-val="'+esc(sha)+'" title="Find entries with this exact SHA-256">'+esc(sha)+'</a></div>';
        if (e.md5)        html += '<div class="tree-meta">md5: <span class="mono">'+esc(e.md5)+'</span> &nbsp; sha1: <span class="mono">'+esc(e.sha1||'—')+'</span></div>';
        if (e.phash)      html += '<div class="tree-meta">phash: <a class="hash-link" data-hash="phash" data-val="'+esc(e.phash)+'" title="Find perceptually-similar entries">'+esc(e.phash)+'</a> &nbsp; colorhash: '+(e.colorhash ? '<a class="hash-link" data-hash="colorhash" data-val="'+esc(e.colorhash)+'" title="Find entries with this exact colorhash">'+esc(e.colorhash)+'</a>' : '<span class="mono">—</span>')+'</div>';
        if (metaHighlights.length) html += '<div class="tree-meta">'+esc(metaHighlights.join(' · '))+'</div>';
        html += renderMetaTable(meta);

        if (qrCodes.length) {
          html += '<div class="tree-meta" style="color:#4fc3f7">';
          for (const c of qrCodes) html += '🔗 '+esc(c.data.slice(0,80))+'<br>';
          html += '</div>';
        }

        // Entry text (Tika-extracted) — shown for non-root entries (macros, embedded docs, etc.)
        // Root entry text is already shown in the top-level "Text" section.
        // For raster images, e.text IS the OCR output — show it in the OCR block below, not here.
        const rawEntryText = (e.depth > 0 && !isRasterImage) ? (e.text||'').trim().replace(/\n{3,}/g,'\n\n') : '';
        // For raster images show e.text directly (it's the OCR output); label it "ocr text".
        const imageOcrText = isRasterImage ? (e.text||'').trim().replace(/\n{3,}/g,'\n\n') : '';

        function renderTextBlock(text, label) {
          if (!text) return '';
          const uid_='tb-'+(Math.random().toString(36).slice(2));
          let out = '<div class="tree-meta">';
          out += '<div class="tree-meta" style="color:#888;font-size:0.7rem;margin-bottom:0.2rem">'+label+'</div>';
          out += '<div class="text-preview" id="'+uid_+'">'+esc(text)+'</div>';
          if (text.length > 300) {
            out += '<span class="text-toggle" data-uid="'+uid_+'" data-full="'+esc(text)+'" onclick="toggleText(this)">▼ show full ('+text.length.toLocaleString()+' chars)</span>';
          }
          out += '</div>';
          return out;
        }

        // SVG: label as "extracted text" (not OCR — it comes from <text> elements)
        const entryLabel = isSvg ? 'extracted text' : 'extracted text';
        html += renderTextBlock(rawEntryText, entryLabel);

        // Raster images: show OCR output once under "ocr text"
        html += renderTextBlock(imageOcrText, 'ocr text');

        // Non-image OCR output (e.g. OCR ran on a PDF page image embedded in a doc)
        if (ocrText && ocrText !== rawEntryText) {
          html += renderTextBlock(ocrText, 'ocr text');
        }

        if (e.error) html += '<div class="tree-meta" style="color:#ef5350">'+esc(e.error.slice(0,120))+'</div>';

        html += '</div></div>';
      }
      html += '</div>';
      return html;
    }

    function treeToggle(uid) {
      const body = document.getElementById(uid);
      const arr  = document.getElementById('arr-'+uid);
      if (!body) return;
      const open = body.style.display==='none';
      body.style.display = open ? 'block' : 'none';
      if (arr) arr.textContent = open ? '▼' : '▶';
      // Lazy-load thumbnails on first open
      if (open) {
        for (const img of body.querySelectorAll('img[data-src]')) {
          img.src = img.getAttribute('data-src');
          img.removeAttribute('data-src');
        }
      }
    }

    function thumbErr(img) {
      img.style.display = 'none';
      img.insertAdjacentHTML('afterend',
        '<div style="color:#555;font-size:0.75rem;margin:0.2rem 0">thumbnail unavailable</div>');
    }

    function kv(k,v) {
      return '<span class="kv-key">'+esc(k)+'</span><span class="kv-val">'+esc(String(v??'—'))+'</span>';
    }
    function kvHash(k,v) {
      return '<span class="kv-key">'+esc(k)+'</span><span class="kv-val hash">'+esc(String(v??'—'))+'</span>';
    }

    // All text display uses esc() before innerHTML injection or textContent assignment.
    // Never use innerHTML with raw document text — malware (HTA/phishing) payloads
    // contain VBScript/JS that must render as inert text, not execute in the browser.
    function toggleText(btn) {
      const uid = btn.getAttribute('data-uid');
      const el = document.getElementById(uid);
      if (!el) return;
      if (el.classList.contains('expanded')) {
        el.classList.remove('expanded');
        // Re-truncate: trim to 300 chars and add ellipsis
        const full = btn.getAttribute('data-full');
        el.textContent = full.slice(0, 300) + '\n…';
        btn.textContent = '▼ show more (' + full.length.toLocaleString() + ' chars)';
      } else {
        el.classList.add('expanded');
        el.textContent = btn.getAttribute('data-full'); // safe: textContent, not innerHTML
        btn.textContent = '▲ show less';
      }
    }

    // ── search ────────────────────────────────────────────────────
    let searchDebounce = null;
    let activeQuery = '';

    function onSearch(val) {
      const q = val.trim();
      document.getElementById('search-clear').style.opacity = q ? '1' : '0.3';
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => triggerSearch(q), 250);
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      onSearch('');
    }

    async function triggerSearch(q) {
      activeQuery = q;
      // Reset to page 1 whenever entering or leaving search mode.
      if (q) currentPage = 1;
      const ind = document.getElementById('refresh-indicator');
      ind.textContent = q ? 'searching…' : 'refreshing…';
      try {
        const stateQS = activeStateFilter ? `&state=${activeStateFilter}` : '';
        const offset = (currentPage - 1) * PAGE_SIZE;
        const url = q
          ? `/v1/jobs?limit=200&q=${encodeURIComponent(q)}${stateQS}`
          : `/v1/jobs?limit=${PAGE_SIZE}&offset=${offset}${stateQS}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const jobs = Array.isArray(data) ? data : (data.jobs || []);

        for (const j of jobs) {
          if (j.state === 'queued' || j.state === 'running') jobCache.delete(j.id);
        }

        renderJobs(jobs, /*append=*/false);
        const countEl = document.getElementById('search-count');
        countEl.textContent = q ? `${jobs.length} result${jobs.length === 1 ? '' : 's'}` : '';
        ind.textContent = 'updated ' + new Date().toLocaleTimeString();
        renderPager();
      } catch(e) {
        ind.textContent = 'error: ' + e.message;
      }
      fetchPoolStatus();
    }

    function applySearch() {} // no-op: search is server-side

    // ── job data cache ────────────────────────────────────────────
    const jobCache = new Map();

    // ── pagination state ──────────────────────────────────────────
    const PAGE_SIZE = 50;
    let currentPage = 1;   // 1-based
    let totalJobs = 0;     // total matching current filter (state, not search)

    function goToPage(p) {
      const maxP = Math.max(1, Math.ceil(totalJobs / PAGE_SIZE));
      currentPage = Math.min(Math.max(1, p), maxP);
      fetchJobs();
    }

    function renderPager() {
      const el = document.getElementById('pager');
      if (!el) return;
      // No pager during a text search (server returns up to 200 results
      // in a single shot; pagination over search would need a separate
      // store API).
      if (activeQuery) {
        el.innerHTML = '';
        return;
      }
      const totalPages = Math.max(1, Math.ceil(totalJobs / PAGE_SIZE));
      if (totalPages <= 1) {
        el.innerHTML = `<span class="count">${totalJobs} job${totalJobs===1?'':'s'}</span>`;
        return;
      }
      const parts = [];
      const pg = (label, page, opts) => {
        const o = opts || {};
        const cls = 'pg' + (o.active ? ' active' : '') + (o.disabled ? ' disabled' : '') + (o.gap ? ' gap' : '');
        if (o.gap) return `<span class="${cls}">…</span>`;
        const click = o.disabled || o.active ? '' : `onclick="goToPage(${page})"`;
        return `<span class="${cls}" ${click}>${label}</span>`;
      };
      parts.push(pg('« First', 1, { disabled: currentPage === 1 }));
      parts.push(pg('‹ Prev', currentPage - 1, { disabled: currentPage === 1 }));

      // Page numbers with smart truncation: 1 ... (cur-1, cur, cur+1) ... last
      const pageSet = new Set([1, totalPages, currentPage, currentPage - 1, currentPage + 1, currentPage - 2, currentPage + 2]);
      const pages = [...pageSet].filter(p => p >= 1 && p <= totalPages).sort((a, b) => a - b);
      let prev = 0;
      for (const p of pages) {
        if (p - prev > 1) parts.push(pg('', 0, { gap: true }));
        parts.push(pg(String(p), p, { active: p === currentPage }));
        prev = p;
      }

      parts.push(pg('Next ›', currentPage + 1, { disabled: currentPage === totalPages }));
      parts.push(pg('Last »', totalPages, { disabled: currentPage === totalPages }));
      parts.push(`<span class="count">page ${currentPage} / ${totalPages} · ${totalJobs} job${totalJobs===1?'':'s'}</span>`);
      el.innerHTML = parts.join('');
    }

    // ── state-filter pills ────────────────────────────────────────
    let activeStateFilter = null; // null | "queued" | "running" | "succeeded" | "failed"

    function setStateFilter(state) {
      // Toggle off if already active
      activeStateFilter = (activeStateFilter === state) ? null : state;
      renderStatePills(window._lastCounts || {});
      // Clear any text-search so the two filters don't fight
      const inp = document.getElementById('search-input');
      if (inp.value) { inp.value = ''; activeQuery = ''; }
      // Reset to first page when filter changes
      currentPage = 1;
      fetchJobs();
    }

    function renderStatePills(counts) {
      window._lastCounts = counts;
      const total = (counts.queued||0) + (counts.running||0) + (counts.succeeded||0) + (counts.failed||0);
      const states = [
        { key: null,        label: 'All',       n: total },
        { key: 'queued',    label: 'Queued',    n: counts.queued    || 0 },
        { key: 'running',   label: 'Running',   n: counts.running   || 0 },
        { key: 'succeeded', label: 'Succeeded', n: counts.succeeded || 0 },
        { key: 'failed',    label: 'Failed',    n: counts.failed    || 0 },
      ];
      const el = document.getElementById('state-pills');
      if (!el) return;
      el.innerHTML = states.map(s => {
        const active = (activeStateFilter === s.key);
        const classes = 'pill' + (s.key ? ' pill-' + s.key : '') + (active ? ' active' : '');
        const onclick = `onclick="setStateFilter(${s.key ? "'"+s.key+"'" : 'null'})"`;
        return `<span class="${classes}" ${onclick}>${s.label}<span class="n">${s.n}</span></span>`;
      }).join('');
    }

    async function fetchJobCounts() {
      try {
        const r = await fetch('/v1/jobs/counts');
        if (!r.ok) return;
        const d = await r.json();
        const counts = d.counts || {};
        renderStatePills(counts);
        // Update totalJobs for the pager based on the active state filter.
        if (activeStateFilter) {
          totalJobs = counts[activeStateFilter] || 0;
        } else {
          totalJobs = (counts.queued||0) + (counts.running||0)
                    + (counts.succeeded||0) + (counts.failed||0);
        }
        // If we're past the last page (e.g. jobs drained / deleted), step
        // back. Don't fire another fetch from here — the regular 3s poll
        // will reflect it.
        const totalPages = Math.max(1, Math.ceil(totalJobs / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;
        renderPager();
      } catch (e) {
        // best-effort
      }
    }

    // ── delete ────────────────────────────────────────────────────
    async function deleteJob(id, btn) {
      if (!confirm('Delete job '+id.slice(0,8)+'?')) return;
      btn.disabled = true;
      try {
        const r = await fetch('/v1/jobs/'+id, {method:'DELETE'});
        if (r.ok||r.status===204) {
          jobCache.delete(id);
          fetchJobs();
        } else {
          const d = await r.json().catch(()=>({detail:'unknown'}));
          alert('Delete failed: '+d.detail);
          btn.disabled = false;
        }
      } catch(e) { alert('Delete failed: '+e.message); btn.disabled=false; }
    }

    // ── client-side routing ───────────────────────────────────────
    //
    //   /              → recent-jobs list view
    //   /jobs/<uuid>   → dedicated detail view for one job
    //
    // The expand-in-place pattern (toggleExpand / openExpand / loadExpand /
    // applyJobDeepLink + a synthetic-row hoist) we used before lived inside
    // the table and fought every poll / pagination / deep-link flow. The
    // click-into pattern is plain SPA routing: each row navigates to its own
    // route, the detail view has the whole viewport to itself, and back /
    // forward buttons + share-as-URL just work.
    let detailPollTimer = null;
    const listPollTimers = [];

    function currentRoute() {
      const m = window.location.pathname.match(/^\/jobs\/([0-9a-fA-F-]+)$/);
      return m ? { kind: 'job', id: m[1] } : { kind: 'list' };
    }

    function navigateToJob(id) {
      const r = currentRoute();
      if (r.kind === 'job' && r.id === id) return;  // already there
      history.pushState({}, '', '/jobs/' + encodeURIComponent(id));
      renderRoute();
    }

    function navigateToList() {
      if (currentRoute().kind === 'list') return;
      history.pushState({}, '', '/');
      renderRoute();
    }

    function stopAllPolls() {
      while (listPollTimers.length) clearInterval(listPollTimers.pop());
      if (detailPollTimer) { clearTimeout(detailPollTimer); detailPollTimer = null; }
    }

    function renderRoute() {
      // Close the slide-out similar-entries panel on every navigation so it
      // doesn't carry stale state from a previous view.
      document.getElementById('similar-panel')?.classList.remove('show');
      const route = currentRoute();
      if (route.kind === 'job') {
        showJobDetailView(route.id);
      } else {
        showListView();
      }
    }

    window.addEventListener('popstate', renderRoute);

    function showListView() {
      stopAllPolls();
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('list-view').style.display = '';
      fetchJobs();
      fetchJobCounts();
      fetchPoolStatus();
      listPollTimers.push(setInterval(fetchJobs, 3000));
      listPollTimers.push(setInterval(fetchJobCounts, 3000));
      listPollTimers.push(setInterval(fetchPoolStatus, 3000));
    }

    async function showJobDetailView(id) {
      stopAllPolls();
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('detail-view').style.display = '';
      const idEl = document.getElementById('detail-id');
      if (idEl) idEl.textContent = id;
      const stateEl = document.getElementById('detail-state');
      if (stateEl) stateEl.innerHTML = '';

      const content = document.getElementById('detail-content');
      content.innerHTML = '<div style="padding:1.5rem;color:#888">Loading…</div>';

      try {
        // Skip cache when navigating to this view — caches go stale fast for
        // queued/running jobs and the per-job fetch is ~6 ms anyway.
        const r = await fetch('/v1/jobs/' + encodeURIComponent(id));
        if (!r.ok) {
          content.innerHTML = '<div style="padding:1.5rem;color:#ef5350">Job not found (HTTP ' + r.status + ')</div>';
          return;
        }
        const job = await r.json();
        renderJobDetail(id, job);

        // Only poll while the job is in flight. Terminal jobs are immutable.
        if (job.state === 'queued' || job.state === 'running') {
          detailPollTimer = setTimeout(() => showJobDetailView(id), 3000);
        }
      } catch (e) {
        content.innerHTML = '<div style="padding:1.5rem;color:#ef5350">Failed: ' + esc(e.message) + '</div>';
      }
    }

    function renderJobDetail(id, job) {
      const stateEl = document.getElementById('detail-state');
      if (stateEl) stateEl.innerHTML = stateCell(job.state);

      const content = document.getElementById('detail-content');
      let html = '<div class="expand-actions" style="margin-bottom:0.75rem">';
      if (job.state === 'succeeded') {
        html += '<a href="/v1/jobs/' + id + '/infected-zip" download><button class="dl">⬇ infected.zip (pw: infected)</button></a>';
      }
      const isTerminal = job.state === 'succeeded' || job.state === 'failed';
      if (isTerminal) {
        html += '<button class="danger" onclick="deleteJobAndGoBack(\'' + id + '\')">Delete</button>';
      }
      html += '</div>';

      if (job.state === 'failed') {
        html += '<div style="color:#ef5350;font-size:0.9rem;margin-bottom:0.75rem">' + esc(job.error_detail || 'Worker error') + '</div>';
      }
      if (job.result) {
        html += buildJobView(job, id);
      } else if (job.state === 'queued' || job.state === 'running') {
        html += '<span style="color:#888">' + job.state + '… (auto-refreshing every 3 s)</span>';
      }
      content.innerHTML = html;
    }

    async function deleteJobAndGoBack(id) {
      if (!confirm('Delete job ' + id + '?')) return;
      try {
        const r = await fetch('/v1/jobs/' + id, { method: 'DELETE' });
        if (r.ok) {
          navigateToList();
        } else {
          let detail = 'unknown';
          try { detail = (await r.json()).detail || detail; } catch {}
          alert('Delete failed: ' + detail);
        }
      } catch (e) {
        alert('Delete failed: ' + e.message);
      }
    }

    // ── pool status ───────────────────────────────────────────────
    async function fetchPoolStatus() {
      try {
        const text = await fetch('/metrics').then(r=>r.text());
        const el = document.getElementById('pool-status');
        const stats = {};
        for (const line of text.split('\n')) {
          const m = line.match(/^redtusk_pool_slots\{state="(\w+)"\}\s+(\d+)/);
          if (m) stats[m[1]]=parseInt(m[2]);
        }
        if (!Object.keys(stats).length) { el.innerHTML=''; return; }
        const colors = {idle:'slot-idle',assigned:'slot-assigned',warming:'slot-warming'};
        let html='<span>Pool:</span>';
        for (const [state,count] of Object.entries(stats)) {
          const cls=colors[state]||'';
          for (let i=0;i<Math.min(count,24);i++) html+='<span class="pool-slot '+cls+'" title="'+state+'"></span>';
          if (count>24) html+='<span>+'+( count-24)+'</span>';
        }
        const total=Object.values(stats).reduce((a,b)=>a+b,0);
        html+='<span>'+total+' slots</span>';
        el.innerHTML=html;
      } catch {}
    }

    // ── jobs table ────────────────────────────────────────────────
    function stateCell(s) {
      return '<span class="state state-'+(s||'queued')+'">'+esc(s||'queued')+'</span>';
    }
    function qrCell(job) {
      // List responses carry qr_count summary; individual fetches have full result
      const n = (job.qr_count != null) ? job.qr_count
              : (job.result?.extraction?.entries||[]).reduce((s,e)=>s+(e.qr?.codes||[]).length,0);
      return n ? '<span class="qr-badge">QR×'+n+'</span>' : '—';
    }

    async function fetchJobs() {
      const ind = document.getElementById('refresh-indicator');
      ind.textContent='refreshing…';
      try {
        // Search: fetch up to 200 results, single shot, no pagination.
        // Normal: fetch the current page via offset=(page-1)*PAGE_SIZE.
        // State filter layers on top of either mode.
        const stateQS = activeStateFilter ? `&state=${activeStateFilter}` : '';
        const offset = (currentPage - 1) * PAGE_SIZE;
        const url = activeQuery
          ? `/v1/jobs?limit=200&q=${encodeURIComponent(activeQuery)}${stateQS}`
          : `/v1/jobs?limit=${PAGE_SIZE}&offset=${offset}${stateQS}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP '+resp.status);
        const data = await resp.json();
        const jobs = Array.isArray(data) ? data : (data.jobs||[]);

        for (const j of jobs) {
          // List response is summary-only; evict stale in-flight entries.
          if (j.state==='queued'||j.state==='running') jobCache.delete(j.id);
        }

        renderJobs(jobs, /*append=*/false);
        ind.textContent='updated '+new Date().toLocaleTimeString();
        renderPager();
      } catch(e) { ind.textContent='error: '+e.message; }
      fetchPoolStatus();
    }

    function rowCells(job) {
      const fullId = job.id || '';
      const fullName = job.filename_hint || '—';
      return '<td class="cell-id" title="'+esc(fullId)+'" style="font-size:0.72rem;letter-spacing:-0.01em">'+esc(fullId)+'</td>'+
        '<td class="cell-truncate" title="'+esc(fullName)+'">'+esc(fullName)+'</td>'+
        '<td>'+stateCell(job.state)+'</td>'+
        '<td>'+relativeTime(job.submitted_at)+'</td>'+
        '<td>'+duration(job)+'</td>'+
        '<td>'+qrCell(job)+'</td>';
    }

    function renderJobs(jobs, append) {
      const tbody = document.getElementById('jobs-body');

      if (append) {
        // Append-only mode: just add new rows at the end of the tbody.
        // Do not touch existing rows.
        for (const job of jobs) {
          if (document.getElementById('row-'+job.id)) continue; // already present
          const tr = document.createElement('tr');
          tr.id='row-'+job.id;
          tr.className='job-row';
          tr.innerHTML = rowCells(job);
          tr.addEventListener('click', ()=>navigateToJob(job.id));
          tbody.appendChild(tr);
        }
        return;
      }

      // Reconcile (append=false) mode.

      // Remove placeholder rows (Loading…, No jobs yet.) before reconciling.
      for (const tr of [...tbody.querySelectorAll('tr:not(.job-row)')]) {
        tr.remove();
      }

      if (!jobs.length) {
        tbody.innerHTML='<tr><td colspan="6" class="no-jobs">No jobs yet.</td></tr>';
        return;
      }

      const jobIds = new Set(jobs.map(j=>j.id));

      // 1. Remove rows whose jobs are no longer in the list. Since we
      //    navigated to /jobs/<id> for the detail view (no inline expansion
      //    here), there's no open panel to preserve — every off-page row
      //    can be evicted cleanly.
      for (const tr of [...tbody.querySelectorAll('tr.job-row')]) {
        const id = tr.id.replace('row-','');
        if (!jobIds.has(id)) tr.remove();
      }

      // 2. Insert/update rows in the API-returned order.
      //    Walk through jobs and ensure each row is in the right DOM position.
      //    Existing rows are updated in-place (mutable cells only).
      let cursor = tbody.firstChild; // DOM position we're placing rows at

      for (const job of jobs) {
        let tr = document.getElementById('row-'+job.id);

        if (tr) {
          // Update the four mutable cells (state, relative-time, duration, qr)
          const tds = tr.querySelectorAll('td');
          if (tds[2]) tds[2].innerHTML = stateCell(job.state);
          if (tds[3]) tds[3].textContent = relativeTime(job.submitted_at);
          if (tds[4]) tds[4].textContent = duration(job);
          if (tds[5]) tds[5].innerHTML = qrCell(job);
        } else {
          // New row
          tr = document.createElement('tr');
          tr.id='row-'+job.id;
          tr.className='job-row';
          tr.innerHTML = rowCells(job);
          tr.addEventListener('click', ()=>navigateToJob(job.id));
        }

        // Move/insert job row at the cursor position
        if (tr !== cursor) tbody.insertBefore(tr, cursor);
        cursor = tr.nextSibling;
      }
    }

    // ── boot ──────────────────────────────────────────────────────
    document.getElementById('search-clear').style.opacity = '0.3';

    // Legacy ?job=<id> URLs still floating around in bookmarks / history —
    // rewrite to /jobs/<id> once on load before the router reads the URL.
    (function migrateLegacyJobQuery() {
      const legacy = new URLSearchParams(window.location.search).get('job');
      if (legacy) {
        history.replaceState({}, '', '/jobs/' + encodeURIComponent(legacy));
      }
    })();

    // Boot the router. showListView / showJobDetailView wire up their own
    // poll intervals via stopAllPolls() + setInterval; there are no
    // top-level setIntervals anymore.
    renderRoute();
  </script>
</body>
</html>
