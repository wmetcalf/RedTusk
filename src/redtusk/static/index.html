<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>RedTusk</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <aside class="similar-panel" id="similar-panel" aria-hidden="true">
    <header>
      <h3 id="similar-title">Similar entries</h3>
      <button class="close-sim" id="similar-close" type="button" aria-label="Close">✕</button>
    </header>
    <div class="similar-controls" id="similar-controls">
      <label>max hamming <input type="number" id="similar-max-hamming" min="0" max="64" value="5"></label>
      <button type="button" id="similar-refetch" style="background:#1f6feb;color:#fff;border:0;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:0.78rem">Refetch</button>
      <span id="similar-count" style="color:#8b949e;font-size:0.78rem;margin-left:0.25rem"></span>
    </div>
    <div class="sim-body" id="similar-body"></div>
  </aside>
  <h1>
    <picture>
      <source srcset="/static/logo.webp" type="image/webp">
      <img src="/static/logo.png" alt="RedTusk" style="height:4rem;vertical-align:middle;margin-right:0.75rem;margin-bottom:0.2rem">
    </picture><a href="/" data-act="nav-list" data-prevent="1" style="color:inherit;text-decoration:none">RedTusk</a> <span id="version"></span> <a id="theme-song" href="https://suno.com/s/JfDeaLrS1JUN6dfe" target="_blank" rel="noopener" title="Theme song" style="font-size:1rem;text-decoration:none;margin-left:0.5rem;opacity:0.7">🎶</a></h1>

  <!-- Detail view — shown only on /jobs/<id>. Renders into #detail-content
       via showJobDetailView(). -->
  <div id="detail-view" style="display:none">
    <div class="card">
      <div class="detail-hdr" style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem">
        <a href="/" data-act="nav-list" data-prevent="1" style="color:#64b5f6;text-decoration:none;font-size:0.9rem">← Recent Jobs</a>
        <span style="color:#555">/</span>
        <span style="font-family:'Courier New',monospace;font-size:0.85rem;color:#c0392b" id="detail-id"></span>
        <span id="detail-state" style="margin-left:auto"></span>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- List view — shown on / (default). The Extract + Recent Jobs cards. -->
  <div id="list-view">
  <div class="card">
    <h2>Extract</h2>
    <div class="upload-row">
      <input type="file" id="file-input" multiple>
    </div>
    <div class="toggles">
      <label><input type="checkbox" id="toggle-qr" checked> QR</label>
      <label><input type="checkbox" id="toggle-ocr" checked> OCR</label>
      <label><input type="checkbox" id="toggle-thumbnails" checked> Thumbnails</label>
      <label style="margin-left:0.5rem;color:#777">Depth:</label>
      <input type="number" id="opt-depth" min="1" max="50" value="10"
             style="width:3.5rem;background:#1a1a1a;border:1px solid #444;color:#ccc;padding:0.1rem 0.3rem;border-radius:3px;font-size:0.85rem">
      <label style="color:#777">Max entries:</label>
      <input type="number" id="opt-entries" min="1" max="10000" value="5000"
             style="width:4.5rem;background:#1a1a1a;border:1px solid #444;color:#ccc;padding:0.1rem 0.3rem;border-radius:3px;font-size:0.85rem">
    </div>
    <div class="btn-row">
      <button id="sync-btn" data-act="upload-sync">Extract (sync)</button>
      <button id="queue-btn" class="secondary" data-act="upload-async">Queue (async)</button>
    </div>
    <div id="upload-status"></div>
    <div id="upload-result"></div>
  </div>

  <div class="card">
    <div class="table-header">
      <h2>Recent Jobs</h2>
      <span id="refresh-indicator"></span>
    </div>
    <div id="pool-status" class="pool-bar"></div>
    <div class="search-row" style="margin-top:0.5rem">
      <input type="text" id="search-input" placeholder="Search by filename (partial), SHA-256, or OCR/extracted text…"
             autocomplete="off" spellcheck="false" title="Search by filename (partial), SHA-256, or job ID">
      <button id="search-clear" data-act="clear-search" title="Clear">×</button>
      <span id="search-count"></span>
    </div>
    <div id="state-pills" style="margin-top:0.4rem;display:flex;gap:0.4rem;flex-wrap:wrap;font-size:0.78rem"></div>
    <div class="jobs-scroll" style="margin-top:0.25rem">
      <table>
        <colgroup>
          <col style="width: 19rem">    <!-- ID (full 36-char UUID, no ellipsis) -->
          <col>                         <!-- Filename (flexes to fill) -->
          <col style="width: 9rem">    <!-- State -->
          <col style="width: 9rem">    <!-- Submitted -->
          <col style="width: 6.5rem">  <!-- Duration -->
          <col style="width: 4.5rem">  <!-- QR -->
        </colgroup>
        <thead>
          <tr><th>ID</th><th>Filename</th><th>State</th><th>Submitted</th><th>Duration</th><th>QR</th></tr>
        </thead>
        <tbody id="jobs-body">
          <tr><td colspan="6" class="no-jobs">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div id="pager"></div>
  </div>
  </div><!-- #list-view -->

  <script src="/static/app.js"></script>
</body>
</html>
