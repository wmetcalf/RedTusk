# Compose overlay: switch RedTusk to the Firecracker worker runtime AND split the
# process for privilege separation. Use via the wrapper:
#
#   ./deploy/docker/redtusk-compose --firecracker up --build -d
#
# Prerequisite: the FC kernel + rootfs must exist on the host at
# REDTUSK_FC_HOST_DIR/{vmlinux,rootfs-vsock.ext4} — build once with:
#
#   scripts/setup_firecracker_host.sh --with-kernel
#
# PRIVILEGE SPLIT (the review's HIGH finding): the public **api** container runs
# `serve --role api` — HTTP + enqueue only, NO /dev/kvm, NO microVM-spawn. A
# separate internal **dispatcher** container runs `serve --role dispatcher`, holds
# /dev/kvm + spawns Firecracker microVMs, and has NO published ports. The Postgres
# queue is the api<->dispatcher channel, so a front-end RCE no longer reaches a KVM
# ioctl primitive. Both keep cap_drop ALL + no-new-privileges + read_only.
#
# Remaining defense-in-depth (tracked): the VMM runs under the Firecracker jailer
# when REDTUSK_FC_USE_JAILER=1 (chroot + cgroups + namespaces + uid-drop), and a
# dedicated dispatcher seccomp profile (the worker whitelist can't be reused — it
# blocks the mount-API syscalls runc init needs + the KVM ioctls). The 127.0.0.1
# default bind is intentionally NOT forced (operator chose 0.0.0.0; see .env.example).

services:
  # Pure-FC never talks to the Docker daemon, so the proxy (raw docker.sock) must
  # not run. Park it behind a profile never activated in FC mode; gVisor mode (the
  # base file alone) keeps it running.
  docker-socket-proxy:
    profiles: ["fc-disabled"]

  # PUBLIC api — role=api: HTTP + enqueue only. Inherits the base Dockerfile.api,
  # published ports, command, state-dir volume, and hardening. NO /dev/kvm, NO
  # firecracker binary, NO microVM-spawn.
  api:
    # Drop the proxy dependency the base declares (it's profile-disabled in FC).
    depends_on: !override
      postgres:
        condition: service_healthy
    # Appended to the base environment — the --role envvar.
    environment:
      - REDTUSK_ROLE=api

  # INTERNAL dispatcher — role=dispatcher: warm pool + claim-loop + FC spawn.
  # Holds /dev/kvm, NO published ports, reached only over the backend network.
  dispatcher:
    image: ${REDTUSK_DISPATCHER_IMAGE:-redtusk-dispatcher-fc:dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.fc-dispatcher
    restart: unless-stopped
    command: ["serve", "--role", "dispatcher"]
    depends_on:
      postgres:
        condition: service_healthy
    devices:
      # /dev/kvm so the firecracker subprocess can ioctl(KVM_*); group_add below
      # lets UID 10001 open it.
      - /dev/kvm
    group_add:
      # Host's kvm group GID — auto-detected by redtusk-compose into .env.
      - "${KVM_GID:?KVM_GID not set — run via ./deploy/docker/redtusk-compose --firecracker}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      # Docker's DEFAULT seccomp (NOT the worker whitelist, which blocks the
      # mount-API syscalls runc init needs + the KVM ioctls). A dedicated
      # dispatcher profile is the tracked follow-up.
      - no-new-privileges:true
    environment:
      - REDTUSK_DATABASE_URL=postgresql://${POSTGRES_USER:-redtusk}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-redtusk}
      - REDTUSK_WORKER_RUNTIME=firecracker
      - REDTUSK_FC_BIN=/opt/kata/bin/firecracker
      - REDTUSK_FC_KERNEL=/var/lib/redtusk/firecracker/vmlinux
      - REDTUSK_FC_ROOTFS=/var/lib/redtusk/firecracker/rootfs-vsock.ext4
      # vcpu_count MUST stay 1 (guest vsock SMP race); see deploy/firecracker/README.md.
      - REDTUSK_FC_VCPU_COUNT=1
      - REDTUSK_FC_VSOCK_RETRIES=${REDTUSK_FC_VSOCK_RETRIES:-2}
      # MUST stay <= REDTUSK_MAX_EXTRACTED_BYTES + 128 MiB; raise both together.
      - REDTUSK_FC_OUTDISK_MIB=${REDTUSK_FC_OUTDISK_MIB:-600}
      # Run the VMM under the firecracker jailer (chroot+cgroups+namespaces+uid).
      # Default off until validated on an FC host; set to 1 to enable.
      - REDTUSK_FC_USE_JAILER=${REDTUSK_FC_USE_JAILER:-0}
      - REDTUSK_PROFILE=${REDTUSK_PROFILE:-default}
      # Pool sizing — DON'T oversubscribe: (warm + burst) x fc_vcpu_count <= cores.
      - REDTUSK_POOL_WARM_SIZE=${REDTUSK_POOL_WARM_SIZE:-8}
      - REDTUSK_POOL_CONCURRENT_SIZE=${REDTUSK_POOL_CONCURRENT_SIZE:-}
      - REDTUSK_POOL_BURST_SIZE=${REDTUSK_POOL_BURST_SIZE:-5}
      - REDTUSK_JOB_TIMEOUT_S=${REDTUSK_JOB_TIMEOUT_S:-90}
      - REDTUSK_WORKER_WARMUP_TIMEOUT_S=${REDTUSK_WORKER_WARMUP_TIMEOUT_S:-120}
      # Same state-dir path inside + outside so the vsock UDS + per-slot output
      # disks resolve identically on the host.
      - REDTUSK_ARTIFACT_ROOT=${REDTUSK_STATE_DIR:?REDTUSK_STATE_DIR must be set in .env}/artifacts
      - REDTUSK_SCRATCH_ROOT=${REDTUSK_STATE_DIR:?REDTUSK_STATE_DIR must be set in .env}/scratch
    tmpfs:
      - /tmp:rw,exec,nosuid,size=1g
    volumes:
      - "${REDTUSK_STATE_DIR:?REDTUSK_STATE_DIR must be set in .env}:${REDTUSK_STATE_DIR:?REDTUSK_STATE_DIR must be set in .env}"
      - "${REDTUSK_FC_HOST_DIR:-/var/lib/redtusk/firecracker}:/var/lib/redtusk/firecracker:ro"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redtusk", "selftest"]
      interval: 30s
      timeout: 10s
      retries: 3
