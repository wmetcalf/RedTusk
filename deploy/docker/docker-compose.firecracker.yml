# Firecracker warm-pool SIDECAR for RedTusk on blastbox.host — a dedicated,
# socket-less warm dispatcher that runs RedTusk's JVM/Tika worker inside hardened,
# disposable Firecracker microVMs (warm-snapshot tier).
#
#   docker compose -f docker-compose.yml -f docker-compose.firecracker.yml up -d dispatcher-fc
#
# FC's isolation is hardware (host KVM), so this needs ONLY /dev/kvm + the kvm
# group — it keeps cap_drop=ALL + read_only + no-new-privileges, holds NO docker
# socket / no ports. BLASTBOX_DISPATCH_WARM_ONLY makes it claim-gate on free warm
# slots and never cold-fall-back, so overflow stays queued for the hardened cold
# dispatcher (docker-compose.yml). This confines the KVM privilege to a
# single-purpose box, OFF the socket-talking cold dispatcher.
#
# Prerequisite — the FC assets on the host at ${REDTUSK_FC_DIR} (default
# /var/lib/redtusk-fc): `firecracker` binary, `vmlinux` kernel, and the redtusk FC
# rootfs `redtusk-rootfs.ext4` (built from blastbox deploy/firecracker/Dockerfile.redtusk
# FROM redtusk-cold-worker:dev). The kernel + binary are engine-agnostic and can be
# reused from a clippyshot FC install.
services:
  dispatcher-fc:
    image: ${REDTUSK_IMAGE:-redtusk:dev}
    command: ["blastbox", "dispatch"]
    restart: unless-stopped
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/kvm
    group_add:
      - "${KVM_GID:-994}"
    environment:
      - BLASTBOX_DATABASE_URL=postgresql://${POSTGRES_USER:-redtusk}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-redtusk}
      - BLASTBOX_JOB_ROOT=${REDTUSK_DATA_DIR:-/var/lib/redtusk}/jobs
      - BLASTBOX_ENGINES=redtusk=${REDTUSK_WORKER_IMAGE:-redtusk-cold-worker:dev}
      # Per-engine allowlist — MUST mirror the cold dispatcher. Without it this warm tier
      # falls back to denylist-only (forwards every shape-valid non-reserved param), so a
      # client's params could reach the worker's REDTUSK_* knobs. Default-deny by default.
      - BLASTBOX_ENGINE_REDTUSK_PARAM_KEYS=${BLASTBOX_ENGINE_REDTUSK_PARAM_KEYS:-}
      # Engine-OWNED reserved keys — MUST mirror the cold dispatcher (see docker-compose.yml).
      # JVM binary/jar/opts/library + CRaC dirs = code-exec vectors; dropped UNCONDITIONALLY
      # so they're blocked even on this warm tier and on the warm→cold JVM-relaunch fallback.
      - BLASTBOX_ENGINE_REDTUSK_RESERVED_KEYS=${BLASTBOX_ENGINE_REDTUSK_RESERVED_KEYS:-REDTUSK_JAVA_BIN,REDTUSK_WORKER_JAR,REDTUSK_JAVA_OPTS,REDTUSK_JAVA_LIBRARY_PATH,REDTUSK_AOT_CACHE,REDTUSK_CRAC_CHECKPOINT,REDTUSK_CRAC_SCRATCH}
      # Trust-gate cap — MUST match the cold dispatcher (RedTusk's rmeta inlines text).
      - BLASTBOX_MAX_METADATA=${BLASTBOX_MAX_METADATA:-104857600}
      # --- sidecar primitive ---
      - BLASTBOX_DISPATCH_WARM_ONLY=1
      # Concurrency MUST match the warm pool size: the warm dispatch path blocks until
      # the job finishes, so N dispatch threads keep N slots busy (default 1 starves it).
      - BLASTBOX_DISPATCH_CONCURRENCY=${BLASTBOX_FC_WARM_SIZE:-4}
      - BLASTBOX_POOL_RUNTIME=firecracker
      - BLASTBOX_POOL_WARM_SNAPSHOT=1
      - BLASTBOX_POOL_WARM_SIZE=${BLASTBOX_FC_WARM_SIZE:-4}
      - BLASTBOX_POOL_CEILING=${BLASTBOX_FC_CEILING:-4}
      - BLASTBOX_POOL_BURST_SIZE=0
      # --- FC config (mounted read-only at /var/lib/blastbox-fc below) ---
      - BLASTBOX_FC_BIN=/var/lib/blastbox-fc/firecracker
      - BLASTBOX_FC_KERNEL=/var/lib/blastbox-fc/vmlinux
      - BLASTBOX_FC_ROOTFS=/var/lib/blastbox-fc/redtusk-rootfs.ext4
      - BLASTBOX_FC_VCPU=${BLASTBOX_FC_VCPU:-2}
      # The in-VM JVM pre-touches an 800m heap + AOT + python — give the guest 2g
      # (mirrors the cold worker's --memory).
      - BLASTBOX_FC_MEM_MIB=${BLASTBOX_FC_MEM_MIB:-2048}
      # Per-slot ext4 output disk. RedTusk's rmeta is large (inlined text, up to
      # ~16 MiB) + embedded artifacts; 1 GiB gives headroom.
      - BLASTBOX_FC_OUTDISK_MIB=${BLASTBOX_FC_OUTDISK_MIB:-1024}
    volumes:
      # job_root (host-consistent, same path as the cold dispatcher) — read staged input.
      - "${REDTUSK_DATA_DIR:-/var/lib/redtusk}/jobs:${REDTUSK_DATA_DIR:-/var/lib/redtusk}/jobs"
      # FC assets (firecracker + vmlinux + redtusk-rootfs.ext4), read-only.
      - "${REDTUSK_FC_DIR:-/var/lib/redtusk-fc}:/var/lib/blastbox-fc:ro"
    tmpfs:
      # FC warm-base memory snapshot + per-slot outdisks (BLASTBOX_FC_SCRATCH defaults
      # to /tmp/blastbox-fc-slots). tmpfs = fast warm restores; sized for the pool
      # (~2g guest mem snapshot + per-slot 1g outdisks × warm_size).
      - /tmp:rw,exec,nosuid,size=12g
    networks:
      - backend
