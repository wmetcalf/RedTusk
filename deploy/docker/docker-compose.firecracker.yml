# Compose overlay that switches the api/dispatcher to the Firecracker worker
# runtime. Use via the wrapper:
#
#   ./deploy/docker/redtusk-compose --firecracker up --build -d
#
# Prerequisite: the FC kernel + rootfs must exist on the host at
# REDTUSK_FC_HOST_DIR/{vmlinux,rootfs-vsock.ext4} — build once with:
#
#   scripts/setup_firecracker_host.sh --with-kernel
#
# The dispatcher still runs in the api container, but now opens /dev/kvm
# and spawns Firecracker microVMs as sibling subprocesses inside the
# container. The FC code path requires no Docker socket, so this overlay
# also drops the docker-socket-proxy dependency from the base file.
#
# SECURITY FOLLOW-UP (recommended, out of scope here): the Firecracker
# launcher currently shares the public api container. Ideally the FC launcher
# runs in a SEPARATE, non-public container that holds /dev/kvm, while the api
# container stays networked-only. Splitting them removes /dev/kvm from the
# internet-facing process. Tracked as a follow-up.

services:
  # Pure-FC never talks to the Docker daemon, so the proxy (which holds the raw
  # /var/run/docker.sock) must not run at all. Park it behind a profile that is
  # never activated in FC mode, so `--firecracker up` won't start it; gVisor
  # mode uses the base file alone (no profile) and keeps it running. (Copilot
  # review — dropping the api's depends_on wasn't enough; compose still started
  # the base service.)
  docker-socket-proxy:
    profiles: ["fc-disabled"]

  api:
    image: ${REDTUSK_API_IMAGE:-redtusk-api-fc:dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.fc-dispatcher
    # Pure-FC never talks to the Docker daemon — drop the proxy dependency the
    # base file declares (otherwise compose would still wait on / start it).
    depends_on: !override
      postgres:
        condition: service_healthy
    devices:
      # Pass /dev/kvm through so the firecracker subprocess can ioctl(KVM_*).
      # Combined with the group_add below this lets UID 10001 open the device.
      - /dev/kvm
    # SECURITY: re-assert the base hardening explicitly so a future merge/edit
    # of the overlay cannot silently drop it. Compose merges scalars by
    # override and these would normally inherit, but /dev/kvm + a kvm group is
    # a privileged combination — make the constraints non-negotiable here.
    read_only: true
    cap_drop:
      - ALL
    # !override REPLACES the base security_opt list (rather than appending,
    # which would duplicate no-new-privileges and fail compose validation).
    # We re-assert no-new-privileges AND add the baked-in seccomp profile.
    security_opt: !override
      - no-new-privileges:true
      # NOTE: we deliberately use Docker's DEFAULT seccomp profile here (by not
      # setting seccomp=), same as the base api container. The repo's
      # redtusk.seccomp.json is a *worker* whitelist — applied to the
      # api/dispatcher container it blocks the new mount-API syscalls
      # (fsopen/fsmount/fstatfs/move_mount) that modern runc uses to reopen its
      # exec fifo, so runc init dies with EPERM ("reopen exec fifo ...
      # operation not permitted") and the container crash-loops. The dispatcher
      # also needs clone/ioctl(KVM_*) broadly while holding /dev/kvm, which the
      # worker profile isn't shaped for. FOLLOW-UP: author a dedicated
      # dispatcher profile (default + KVM ioctl arg-filtering) rather than
      # reusing the worker one, then re-enable a custom seccomp= here.
    # FC-only mode drops the Docker socket: in pure-FC the dispatcher never
    # calls `docker run` (it spawns firecracker subprocesses directly). The
    # base file already removed the raw socket bind in favour of the proxy;
    # here we also omit the proxy entirely. Compose-2.x `!override` REPLACES
    # the base list (vs `!reset` which clears it to null and discards the
    # entries below) — GPT-5.5 review G1 / G1' caught the `!reset` bug.
    volumes: !override
      # Preserve the state-dir bind-mount from the base; explicitly omit the
      # docker socket. Same path inside and outside the api container so the
      # vsock UDS + per-slot output disks resolve identically.
      - "${REDTUSK_STATE_DIR:?REDTUSK_STATE_DIR must be set in .env — points at a host dir for persistent scratch+artifacts}:${REDTUSK_STATE_DIR:?REDTUSK_STATE_DIR must be set in .env — points at a host dir for persistent scratch+artifacts}"
      # FC assets (kernel + rootfs) — read-only.
      - "${REDTUSK_FC_HOST_DIR:-/var/lib/redtusk/firecracker}:/var/lib/redtusk/firecracker:ro"
    group_add: !override
      # Host's kvm group GID — auto-detected by redtusk-compose, written to .env.
      # No DOCKER_GID: pure-FC doesn't talk to the Docker daemon.
      - "${KVM_GID:?KVM_GID not set — run via ./deploy/docker/redtusk-compose --firecracker, not raw docker compose}"
    environment:
      - REDTUSK_WORKER_RUNTIME=firecracker
      - REDTUSK_FC_BIN=/opt/kata/bin/firecracker
      - REDTUSK_FC_KERNEL=/var/lib/redtusk/firecracker/vmlinux
      - REDTUSK_FC_ROOTFS=/var/lib/redtusk/firecracker/rootfs-vsock.ext4
      # vcpu_count MUST stay 1 (guest vsock SMP race); see deploy/firecracker/README.md.
      - REDTUSK_FC_VCPU_COUNT=1
      - REDTUSK_FC_VSOCK_RETRIES=${REDTUSK_FC_VSOCK_RETRIES:-2}
      # Default 600 MiB matches limits.py's default; stays under the
      # max_extracted_bytes + 128 MiB slack the validation enforces.
      # Raise BOTH together if you raise either.
      - REDTUSK_FC_OUTDISK_MIB=${REDTUSK_FC_OUTDISK_MIB:-600}
      # Pool sizing uses REDTUSK_POOL_WARM_SIZE / REDTUSK_POOL_BURST_SIZE from
      # .env — the base compose passes these canonical names through. The legacy
      # REDTUSK_POOL_SIZE alias is NOT injected, so setting it has no effect in
      # FC mode. For FC, set REDTUSK_POOL_WARM_SIZE in .env to your warm target
      # — DON'T oversubscribe: (warm + burst) × fc_vcpu_count ≤ host cores.
    # /tmp must be at least the size of the largest single artifact we'd
    # process — Starlette spools multipart uploads here. The default
    # 128m blew up under concurrent large uploads; bump to 1g for FC.
    tmpfs:
      - /tmp:rw,exec,nosuid,size=1g
