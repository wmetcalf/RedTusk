# RedTusk compose stack — runs ON blastbox.host.
# Usage: ./deploy/docker/redtusk-compose up --build -d
# Web UI + API at http://localhost:8000/
#
# The ingress is `blastbox serve` with RedTusk's rmeta route + web UI mounted via
# the ingress extension (BLASTBOX_INGRESS_EXTENSION). The dispatcher is
# `blastbox dispatch`: it claims queued jobs and launches one hardened, disposable
# redtusk-cold-worker container per job (runsc by default). Only the dispatcher
# touches the Docker socket; the api never does.
#
# This replaced the bespoke `redtusk serve` + dispatcher + docker-socket-proxy
# stack — blastbox.host now provides ingress/dispatch/jobs/similar/result.

services:
  postgres:
    # postgres:16-alpine + evirma/pg_bktree, so blastbox's SqlJobStore can build
    # SP-GiST Hamming-distance indexes on perceptual hashes (powers /v1/similar).
    build:
      context: postgres
    image: redtusk-postgres:dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redtusk}
      POSTGRES_USER: ${POSTGRES_USER:-redtusk}
      # SECURITY: no default — startup fails fast if unset. Use a strong random
      # value (openssl rand -base64 32) in deploy/docker/.env.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env — use a strong random value}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  # Least-privilege Docker API proxy — the SOLE holder of the real socket. The
  # dispatcher reaches it over the internal backend network (DOCKER_HOST=
  # tcp://docker-socket-proxy:2375) instead of being handed the raw, root-equivalent
  # /var/run/docker.sock. A dispatcher RCE can then reach only the Docker verbs
  # enabled below — the minimum `blastbox dispatch` uses: `docker run`
  # (create/start/attach/wait/rm = CONTAINERS, pull = IMAGES, POST), `docker kill`
  # (CONTAINERS), `docker info` (INFO). Everything else stays at the image DENY default.
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - INFO=1
      - POST=1
      - VERSION=1           # docker CLI/SDK negotiates the API version on connect
      # Everything else explicitly denied (defence in depth; 0 is already default).
      - NETWORKS=0
      - VOLUMES=0
      - EXEC=0
      - SWARM=0
      - SERVICES=0
      - TASKS=0
      - NODES=0
      - SECRETS=0
      - CONFIGS=0
      - PLUGINS=0
      - SYSTEM=0
      - AUTH=0
      - BUILD=0
      - COMMIT=0
      - DISTRIBUTION=0
      - SESSION=0
    volumes:
      # The ONLY container that touches the real socket (read-only bind).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # tecnativa renders haproxy.cfg into this dir at boot, which fails under
      # read_only; a named volume is writable and seeded from the image.
      - proxy-haproxy-cfg:/usr/local/etc/haproxy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /run
    networks:
      # Internal only — never exposed to frontend, no ports mapping.
      - backend

  api:
    image: ${REDTUSK_IMAGE:-redtusk:dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - BLASTBOX_DATABASE_URL=postgresql://${POSTGRES_USER:-redtusk}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-redtusk}
      - BLASTBOX_JOB_ROOT=${REDTUSK_DATA_DIR:-/var/lib/redtusk}/jobs
      - BLASTBOX_JOB_RETENTION_SECONDS=${BLASTBOX_JOB_RETENTION_SECONDS:-0}
      # RedTusk's rmeta inlines per-entry extracted text, so the envelope is larger
      # than the blastbox 4 MiB default (observed up to ~16 MiB on the corpus, ~2.6%
      # of docs exceed 4 MiB). 100 MiB covers it with wide headroom, still DoS-bounded.
      # MUST match the dispatcher (the trust gate there enforces it).
      - BLASTBOX_MAX_METADATA=${BLASTBOX_MAX_METADATA:-104857600}
      - BLASTBOX_ALLOWED_ENGINES=redtusk
      - BLASTBOX_INGRESS_EXTENSION=redtusk.blastbox_ingress:make_extension
      # Per-job tier routing (target_tier pins which dispatcher tier claims a job) is an
      # OPERATOR/TEST knob — default OFF so a client can't pin/flood a pool. Set to 1 to let
      # the API accept a target_tier form field; dispatchers always honor a set target_tier.
      - BLASTBOX_ALLOW_TIER_ROUTING=${BLASTBOX_ALLOW_TIER_ROUTING:-}
    ports:
      # The app does not authenticate — front with a reverse proxy for any exposed
      # deploy. REDTUSK_BIND_ADDR=127.0.0.1 restricts to localhost.
      - "${REDTUSK_BIND_ADDR:-0.0.0.0}:${REDTUSK_PORT:-8000}:8000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,exec,nosuid,size=2g
    volumes:
      # Host-CONSISTENT path, NOT a named volume: the dispatcher launches workers
      # whose job-dir bind-mounts are resolved by the host docker daemon, so
      # job_root must exist at the SAME path on host + container.
      - ${REDTUSK_DATA_DIR:-/var/lib/redtusk}:${REDTUSK_DATA_DIR:-/var/lib/redtusk}
    command: ["blastbox", "serve", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test:
        - "CMD"
        - "/opt/redtusk/bin/python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/healthz', timeout=5).status==200 else 1)"
      interval: 30s
      timeout: 15s
      start_period: 20s
      retries: 3
    networks:
      - backend
      - frontend

  # Claims queued jobs and launches one hardened disposable worker per job via
  # `docker run --runtime=runsc …` (runc is REFUSED unless BLASTBOX_ALLOW_RUNC=1).
  # The worker image is redtusk-cold-worker:dev (Dockerfile.cold-worker →
  # `python -m blastbox.worker.cold` with BLASTBOX_ENGINE=redtusk.engine:RedTuskEngine
  # + the JVM/Tika baked in). Reaches Docker ONLY through the least-privilege
  # docker-socket-proxy (DOCKER_HOST below) — never the raw socket.
  dispatcher:
    image: ${REDTUSK_IMAGE:-redtusk:dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    environment:
      - BLASTBOX_DATABASE_URL=postgresql://${POSTGRES_USER:-redtusk}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-redtusk}
      - BLASTBOX_JOB_ROOT=${REDTUSK_DATA_DIR:-/var/lib/redtusk}/jobs
      - BLASTBOX_JOB_RETENTION_SECONDS=${BLASTBOX_JOB_RETENTION_SECONDS:-0}
      # Trust-gate cap on the worker's metadata.json. RedTusk's rmeta inlines
      # per-entry extracted text → larger than the 4 MiB default (up to ~16 MiB on
      # the corpus); 100 MiB covers it with headroom, still bounded. MUST match the api.
      - BLASTBOX_MAX_METADATA=${BLASTBOX_MAX_METADATA:-104857600}
      # Reach the Docker daemon ONLY via the least-privilege proxy over TCP — the
      # docker CLI (which blastbox shells out to) honours DOCKER_HOST. No raw socket.
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      # EngineSpec registry: NAME=image:tag. Worker image built from
      # Dockerfile.cold-worker (which is FROM redtusk-worker:default).
      - BLASTBOX_ENGINES=redtusk=${REDTUSK_WORKER_IMAGE:-redtusk-cold-worker:dev}
      # Per-engine forwardable-param allowlist (default-deny). RedTusk per-request
      # overrides (enable_qr/ocr/thumbnails, max_recursion_depth, …) are a follow-on
      # (the engine still uses its built-in job defaults); empty = forward nothing.
      - BLASTBOX_ENGINE_REDTUSK_PARAM_KEYS=${BLASTBOX_ENGINE_REDTUSK_PARAM_KEYS:-}
      # Engine-OWNED reserved keys (blastbox core is engine-agnostic; RedTusk names its own
      # dangerous knobs here). These are CODE-EXEC vectors a client must NEVER set via
      # job.params — the JVM binary / worker jar / JVM opts (-javaagent…) / native library
      # path / AOT cache, and the CRaC checkpoint+scratch dirs (restore an attacker image).
      # The engine reads them from os.environ when it launches/feeds the JVM (cold + warm→cold
      # fallback). Dropped UNCONDITIONALLY — before the allowlist — so they're blocked even on
      # a warm tier running without the (optional, default-empty) allowlist. Non-empty default
      # = the floor holds with no extra config. Operator-set CONTAINER env (the real values
      # baked into the image) is unaffected; only client job.params overrides are dropped.
      - BLASTBOX_ENGINE_REDTUSK_RESERVED_KEYS=${BLASTBOX_ENGINE_REDTUSK_RESERVED_KEYS:-REDTUSK_JAVA_BIN,REDTUSK_WORKER_JAR,REDTUSK_JAVA_OPTS,REDTUSK_JAVA_LIBRARY_PATH,REDTUSK_AOT_CACHE,REDTUSK_CRAC_CHECKPOINT,REDTUSK_CRAC_SCRATCH}
      - BLASTBOX_DISPATCH_CONCURRENCY=${BLASTBOX_DISPATCH_CONCURRENCY:-}
      - BLASTBOX_WORKER_TIMEOUT_S=${BLASTBOX_WORKER_TIMEOUT_S:-300}
      # Opt-in ceiling (0 = off) on QUEUED age before a job is FAILed + its input deleted —
      # bounds a target_tier pinned to a tier with no running dispatcher (routing-enabled mode).
      - BLASTBOX_MAX_QUEUED_AGE_S=${BLASTBOX_MAX_QUEUED_AGE_S:-0}
      # Worker runtime: empty = auto-detect (prefer runsc). Plain runc is
      # fail-closed REFUSED unless BLASTBOX_ALLOW_RUNC=1.
      - BLASTBOX_WORKER_RUNTIME=${BLASTBOX_WORKER_RUNTIME:-}
      - BLASTBOX_ALLOW_RUNC=${BLASTBOX_ALLOW_RUNC:-0}
      - BLASTBOX_REQUIRE_SECURE_RUNTIME=${BLASTBOX_REQUIRE_SECURE_RUNTIME:-0}
      # The RedTusk JVM worker pre-touches an 800m heap (-Xms800m
      # -XX:+AlwaysPreTouch) + the ~50m AOT cache + python; under a smaller cap the
      # JVM is OOM-killed at startup (exit 137, no metadata.json). Default to 2g —
      # the value the pre-cutover bespoke `docker run` used. Do not lower below ~1.5g.
      - BLASTBOX_WORKER_MEMORY=${BLASTBOX_WORKER_MEMORY:-2g}
      # NOTE: these MUST be non-empty. blastbox reads them with
      # os.environ.get(key, default), which returns "" when the key is set-but-empty
      # (NOT the default), so an empty value emits a bare `--pids-limit`/`--cpus`
      # flag → docker eats the next token as the value → arg-parse failure → the
      # worker exits in ~30ms with no metadata.json. pids=512 (the JVM/Tika spawns
      # many threads; matches the pre-cutover bespoke `--pids-limit=512`); cpus=2.
      - BLASTBOX_WORKER_PIDS_LIMIT=${BLASTBOX_WORKER_PIDS_LIMIT:-512}
      - BLASTBOX_WORKER_CPUS=${BLASTBOX_WORKER_CPUS:-2}
      - BLASTBOX_WORKER_NOFILE=${BLASTBOX_WORKER_NOFILE:-4096}
      - BLASTBOX_SECCOMP_JSON_HOST=${BLASTBOX_SECCOMP_JSON_HOST:-}
      - BLASTBOX_APPARMOR_PROFILES=${BLASTBOX_APPARMOR_PROFILES:-}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # No group_add: the dispatcher reaches Docker over TCP via the proxy, not a
    # bind-mounted socket, so it no longer needs the host docker group.
    tmpfs:
      - /tmp:rw,nosuid,size=64m
    volumes:
      - ${REDTUSK_DATA_DIR:-/var/lib/redtusk}:${REDTUSK_DATA_DIR:-/var/lib/redtusk}
      # SECURITY: the raw docker.sock bind mount is intentionally ABSENT — the
      # dispatcher talks to docker-socket-proxy (DOCKER_HOST). Do not re-add it.
    command: ["blastbox", "dispatch"]
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 30s
      timeout: 15s
      start_period: 20s
      retries: 3
    networks:
      - backend

networks:
  backend:
    internal: true
  frontend:

volumes:
  postgres-data:
  proxy-haproxy-cfg:
  # No redtusk-data volume: job_root is a host bind-mount (see api/dispatcher),
  # required so dispatcher-launched workers can bind-mount job dirs by host path.
