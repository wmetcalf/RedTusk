# RedTusk compose stack — runs ON blastbox.host.
# Usage: ./deploy/docker/redtusk-compose up --build -d
# Web UI + API at http://localhost:8000/
#
# The ingress is `blastbox serve` with RedTusk's rmeta route + web UI mounted via
# the ingress extension (BLASTBOX_INGRESS_EXTENSION). The dispatcher is
# `blastbox dispatch`: it claims queued jobs and launches one hardened, disposable
# redtusk-cold-worker container per job (runsc by default). Only the dispatcher
# touches the Docker socket; the api never does.
#
# This replaced the bespoke `redtusk serve` + dispatcher + docker-socket-proxy
# stack — blastbox.host now provides ingress/dispatch/jobs/similar/result.

services:
  postgres:
    # postgres:16-alpine + evirma/pg_bktree, so blastbox's SqlJobStore can build
    # SP-GiST Hamming-distance indexes on perceptual hashes (powers /v1/similar).
    build:
      context: postgres
    image: redtusk-postgres:dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redtusk}
      POSTGRES_USER: ${POSTGRES_USER:-redtusk}
      # SECURITY: no default — startup fails fast if unset. Use a strong random
      # value (openssl rand -base64 32) in deploy/docker/.env.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env — use a strong random value}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  api:
    image: ${REDTUSK_IMAGE:-redtusk:dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - BLASTBOX_DATABASE_URL=postgresql://${POSTGRES_USER:-redtusk}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-redtusk}
      - BLASTBOX_JOB_ROOT=${REDTUSK_DATA_DIR:-/var/lib/redtusk}/jobs
      - BLASTBOX_JOB_RETENTION_SECONDS=${BLASTBOX_JOB_RETENTION_SECONDS:-0}
      - BLASTBOX_ALLOWED_ENGINES=redtusk
      - BLASTBOX_INGRESS_EXTENSION=redtusk.blastbox_ingress:make_extension
    ports:
      # The app does not authenticate — front with a reverse proxy for any exposed
      # deploy. REDTUSK_BIND_ADDR=127.0.0.1 restricts to localhost.
      - "${REDTUSK_BIND_ADDR:-0.0.0.0}:${REDTUSK_PORT:-8000}:8000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,exec,nosuid,size=2g
    volumes:
      # Host-CONSISTENT path, NOT a named volume: the dispatcher launches workers
      # whose job-dir bind-mounts are resolved by the host docker daemon, so
      # job_root must exist at the SAME path on host + container.
      - ${REDTUSK_DATA_DIR:-/var/lib/redtusk}:${REDTUSK_DATA_DIR:-/var/lib/redtusk}
    command: ["blastbox", "serve", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test:
        - "CMD"
        - "/opt/redtusk/bin/python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/healthz', timeout=5).status==200 else 1)"
      interval: 30s
      timeout: 15s
      start_period: 20s
      retries: 3
    networks:
      - backend
      - frontend

  # Claims queued jobs and launches one hardened disposable worker per job via
  # `docker run --runtime=runsc …` (runc is REFUSED unless BLASTBOX_ALLOW_RUNC=1).
  # The worker image is redtusk-cold-worker:dev (Dockerfile.cold-worker →
  # `python -m blastbox.worker.cold` with BLASTBOX_ENGINE=redtusk.engine:RedTuskEngine
  # + the JVM/Tika baked in). Only this service has the Docker socket.
  dispatcher:
    image: ${REDTUSK_IMAGE:-redtusk:dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - BLASTBOX_DATABASE_URL=postgresql://${POSTGRES_USER:-redtusk}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-redtusk}
      - BLASTBOX_JOB_ROOT=${REDTUSK_DATA_DIR:-/var/lib/redtusk}/jobs
      - BLASTBOX_JOB_RETENTION_SECONDS=${BLASTBOX_JOB_RETENTION_SECONDS:-0}
      # EngineSpec registry: NAME=image:tag. Worker image built from
      # Dockerfile.cold-worker (which is FROM redtusk-worker:default).
      - BLASTBOX_ENGINES=redtusk=${REDTUSK_WORKER_IMAGE:-redtusk-cold-worker:dev}
      # Per-engine forwardable-param allowlist (default-deny). RedTusk per-request
      # overrides (enable_qr/ocr/thumbnails, max_recursion_depth, …) are a follow-on
      # (the engine still uses its built-in job defaults); empty = forward nothing.
      - BLASTBOX_ENGINE_REDTUSK_PARAM_KEYS=${BLASTBOX_ENGINE_REDTUSK_PARAM_KEYS:-}
      - BLASTBOX_DISPATCH_CONCURRENCY=${BLASTBOX_DISPATCH_CONCURRENCY:-}
      - BLASTBOX_WORKER_TIMEOUT_S=${BLASTBOX_WORKER_TIMEOUT_S:-300}
      # Worker runtime: empty = auto-detect (prefer runsc). Plain runc is
      # fail-closed REFUSED unless BLASTBOX_ALLOW_RUNC=1.
      - BLASTBOX_WORKER_RUNTIME=${BLASTBOX_WORKER_RUNTIME:-}
      - BLASTBOX_ALLOW_RUNC=${BLASTBOX_ALLOW_RUNC:-0}
      - BLASTBOX_REQUIRE_SECURE_RUNTIME=${BLASTBOX_REQUIRE_SECURE_RUNTIME:-0}
      - BLASTBOX_WORKER_MEMORY=${BLASTBOX_WORKER_MEMORY:-}
      - BLASTBOX_WORKER_PIDS_LIMIT=${BLASTBOX_WORKER_PIDS_LIMIT:-}
      - BLASTBOX_WORKER_CPUS=${BLASTBOX_WORKER_CPUS:-}
      - BLASTBOX_WORKER_NOFILE=${BLASTBOX_WORKER_NOFILE:-4096}
      - BLASTBOX_SECCOMP_JSON_HOST=${BLASTBOX_SECCOMP_JSON_HOST:-}
      - BLASTBOX_APPARMOR_PROFILES=${BLASTBOX_APPARMOR_PROFILES:-}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    group_add:
      - "${DOCKER_GID:-984}"
    tmpfs:
      - /tmp:rw,nosuid,size=64m
    volumes:
      - ${REDTUSK_DATA_DIR:-/var/lib/redtusk}:${REDTUSK_DATA_DIR:-/var/lib/redtusk}
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["blastbox", "dispatch"]
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 30s
      timeout: 15s
      start_period: 20s
      retries: 3
    networks:
      - backend

networks:
  backend:
    internal: true
  frontend:

volumes:
  postgres-data:
  # No redtusk-data volume: job_root is a host bind-mount (see api/dispatcher),
  # required so dispatcher-launched workers can bind-mount job dirs by host path.
