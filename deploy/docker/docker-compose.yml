# RedTusk compose stack
# Usage: ./deploy/docker/redtusk-compose up --build -d
# Web UI + API at http://localhost:8000/
#
# The api service runs redtusk serve (api + dispatcher in one process).
# The dispatcher spawns worker containers via the Docker socket.

services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-redtusk}
      POSTGRES_USER:     ${POSTGRES_USER:-redtusk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redtusk-dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  api:
    image: ${REDTUSK_API_IMAGE:-redtusk-api:dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - REDTUSK_DATABASE_URL=postgresql://${POSTGRES_USER:-redtusk}:${POSTGRES_PASSWORD:-redtusk-dev}@postgres:5432/${POSTGRES_DB:-redtusk}
      - REDTUSK_WORKER_IMAGE=${REDTUSK_WORKER_IMAGE:-redtusk:latest}
      - REDTUSK_PROFILE=${REDTUSK_PROFILE:-default}
      - REDTUSK_ENABLE_OCR=true
      - REDTUSK_WORKER_RUNTIME=${REDTUSK_WORKER_RUNTIME:-}
      - REDTUSK_WORKER_SECCOMP_PROFILE=${REDTUSK_WORKER_SECCOMP_PROFILE:-}
      - REDTUSK_WORKER_APPARMOR_PROFILE=${REDTUSK_WORKER_APPARMOR_PROFILE:-}
      - REDTUSK_POOL_SIZE=${REDTUSK_POOL_SIZE:-8}
      - REDTUSK_JOB_TIMEOUT_S=${REDTUSK_JOB_TIMEOUT_S:-90}
      - REDTUSK_WORKER_WARMUP_TIMEOUT_S=${REDTUSK_WORKER_WARMUP_TIMEOUT_S:-120}
      # Use /tmp for scratch (tmpfs, UID 10001 writable, ephemeral per restart).
      # Artifacts also in /tmp for dev; for production persistence mount a volume
      # and set REDTUSK_ARTIFACT_ROOT to a path owned by UID 10001.
      - REDTUSK_ARTIFACT_ROOT=/tmp/redtusk/artifacts
      - REDTUSK_SCRATCH_ROOT=/tmp/redtusk/scratch
    ports:
      - "${REDTUSK_PORT:-8000}:8000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    group_add:
      # DOCKER_GID is auto-detected by the redtusk-compose wrapper.
      # If running docker compose directly (not via wrapper), export:
      #   export DOCKER_GID=$(stat -c %g /var/run/docker.sock)
      # The fallback 984 matches RHEL; Ubuntu=110, Debian=999 — always use the wrapper.
      - "${DOCKER_GID:-984}"
    tmpfs:
      - /tmp:rw,exec,nosuid,size=128m
    volumes:
      # Bind-mount host /tmp/redtusk so scratch dirs are visible to the Docker daemon
      # when it creates bind mounts for worker containers. The daemon resolves
      # source paths on the HOST, not inside this container's tmpfs.
      - /tmp/redtusk:/tmp/redtusk
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "redtusk", "selftest"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3
    networks:
      - backend
      - frontend

volumes:
  postgres-data:

networks:
  backend:
  frontend:
